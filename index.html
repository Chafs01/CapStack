<script type="text/babel">
const {useState,useMemo,useCallback,useRef,useEffect}=React;

// ─── SUPABASE ─────────────────────────────────────────────────────────────
const SUPA_URL='https://ebkfcnkoswdclwnqtwna.supabase.co';
const SUPA_KEY='sb_publishable_6WblJ_u5DRvv-zMUAJnmnw_nlvv3TQR';
const sb=window.supabase.createClient(SUPA_URL,SUPA_KEY);

// ─── FORMATTERS ───────────────────────────────────────────────────────────
const f={
  $:(n,compact=true)=>{if(n==null||isNaN(n))return'$—';const s=n<0;const a=Math.abs(n);if(compact){if(a>=1e9)return`${s?'-':''}$${(a/1e9).toFixed(2)}B`;if(a>=1e6)return`${s?'-':''}$${(a/1e6).toFixed(2)}M`;if(a>=1e3)return`${s?'-':''}$${(a/1e3).toFixed(0)}K`;}return`${s?'-$':'$'}${a.toLocaleString('en-US',{maximumFractionDigits:0})}`},
  $f:(n)=>{if(n==null||isNaN(n))return'$—';return`${n<0?'-$':'$'}${Math.abs(n).toLocaleString('en-US',{maximumFractionDigits:0})}`},
  pct:(n,d=1)=>{if(n==null||isNaN(n))return'—%';return`${(n*100).toFixed(d)}%`},
  x:(n)=>{if(n==null||isNaN(n))return'—x';return`${n.toFixed(2)}x`},
  n:(n,d=2)=>{if(n==null||isNaN(n))return'—';return n.toFixed(d)},
};
const pn=(v,fb=0)=>{const n=parseFloat(String(v||'').replace(/[$,%]/g,''));return isNaN(n)?fb:n};

// ─── FINANCIAL ENGINE ─────────────────────────────────────────────────────
function monthlyPmt(P,r_annual,yrs){
  if(!P||P<=0)return 0;
  if(!r_annual||r_annual<=0)return P/(yrs*12);
  const r=r_annual/12,n=yrs*12;
  return P*(r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
}
function loanBal(P,r_annual,yrs,months){
  if(!P||P<=0)return 0;
  if(!r_annual||r_annual<=0)return Math.max(0,P-(P/(yrs*12))*months);
  const r=r_annual/12,n=yrs*12;
  const pmt=monthlyPmt(P,r_annual,yrs);
  return Math.max(0,P*Math.pow(1+r,months)-pmt*(Math.pow(1+r,months)-1)/r);
}
function calcIRR(cfs){
  if(!cfs||cfs.length<2)return NaN;
  const npvAt=r=>cfs.reduce((s,c,t)=>s+c/Math.pow(1+r,t),0);
  let r=0.12,ok=false;
  for(let i=0;i<600;i++){
    let npv=0,d=0;
    for(let t=0;t<cfs.length;t++){
      const disc=Math.pow(1+r,t);
      npv+=cfs[t]/disc;
      d-=t*cfs[t]/(disc*(1+r));
    }
    if(Math.abs(d)<1e-12)break;
    const nr=r-npv/d;
    if(Math.abs(nr-r)<1e-8){r=nr;ok=true;break;}
    r=Math.max(-0.99,Math.min(50,nr));
  }
  if(ok&&isFinite(r)&&Math.abs(npvAt(r))<1)return r;
  let lo=-0.95,hi=10;
  let fLo=npvAt(lo),fHi=npvAt(hi);
  if(fLo*fHi>0)return isFinite(r)?r:NaN;
  for(let i=0;i<200;i++){
    const mid=(lo+hi)/2,fM=npvAt(mid);
    if(Math.abs(fM)<1e-7)return mid;
    if(fLo*fM<0){hi=mid;fHi=fM}else{lo=mid;fLo=fM}
  }
  return (lo+hi)/2;
}
function calcNPV(cfs,rate){
  return cfs.reduce((s,c,t)=>s+c/Math.pow(1+rate,t),0);
}

function umGPI(m){return(m||[]).reduce((s,r)=>s+(+r.count||0)*(+r.rent||0)*12,0);}
function rtGPI(r){return(r||[]).reduce((s,x)=>s+(+x.sf||0)*(+x.rentPerSF||0),0);}
function getGPI(inp){
  const t=(inp.assetType||'').toLowerCase();
  const hasUM=inp.unitMix&&inp.unitMix.length;
  const hasRT=inp.retailIncome&&inp.retailIncome.length;
  const resGPI=hasUM?umGPI(inp.unitMix):(inp.numUnits||0)*(inp.avgRent||0)*12;
  if(t==='multifamily'||t==='affordable')return resGPI;
  if(t==='commercial')return(hasRT?rtGPI(inp.retailIncome):(inp.totalSF||0)*(inp.avgRentPerSF||0))+(inp.camIncome||0);
  if(t==='mixed-use')return resGPI+(hasRT?rtGPI(inp.retailIncome):(inp.commercialSF||0)*(inp.commercialRentPerSF||0));
  if(t==='development'){
    if(hasUM)return resGPI;
    if(inp.numUnits&&inp.avgRent)return(inp.numUnits||0)*(inp.avgRent||0)*12;
    return(inp.stabilizedNOI||0)/0.52;
  }
  return 0;
}
function getOpEx(inp){
  const gpi=getGPI(inp);
  const vac=inp.vacancyRate||0;
  const egi=gpi*(1-vac/100)+(inp.otherIncome||0);
  return(inp.propertyTax||0)+(inp.insurance||0)+egi*(inp.managementFeePct||0)/100+(inp.maintenance||0)+(inp.utilities||0)+(inp.reserves||0)+(inp.administrative||0);
}
function getDevCost(inp){
  const hard=(inp.grossBuildableSF||0)*(inp.hardCostPerSF||0);
  const soft=hard*(inp.softCostsPct||0)/100;
  const devFee=inp.developerFee||0;
  return(inp.landCost||inp.purchasePrice||0)+hard+soft+devFee;
}

function calcLIHTC(inp,permLoan){
  const land=inp.landCost||inp.purchasePrice||0;
  const hard=(inp.grossBuildableSF||0)*(inp.hardCostPerSF||0);
  const soft=hard*(inp.softCostsPct||0)/100;
  const devFee=inp.developerFee||0;
  const totalUses=land+hard+soft+devFee;
  const ebPct=(inp.eligibleBasisPct!=null?inp.eligibleBasisPct:95)/100;
  const eligibleBasis=(hard+soft+devFee)*ebPct;
  const boostPct=inp.qctDda?130:100;
  const boostedBasis=eligibleBasis*boostPct/100;
  const af=(inp.affordablePct!=null?inp.affordablePct:100)/100;
  const qualifiedBasis=boostedBasis*af;
  const creditRate=(inp.creditRate!=null?inp.creditRate:(String(inp.creditType)==='4'?4:9))/100;
  const annualCredit=qualifiedBasis*creditRate;
  const tenYearCredits=annualCredit*10;
  const creditPrice=inp.creditPrice!=null?inp.creditPrice:0.90;
  const lihtcEquity=tenYearCredits*creditPrice;
  const softSources=inp.softSources||0;
  const beforeDefer=permLoan+lihtcEquity+softSources;
  const gapBeforeDefer=totalUses-beforeDefer;
  const maxDeferrable=devFee*((inp.maxDeferPct!=null?inp.maxDeferPct:100)/100);
  const deferredFee=Math.max(0,Math.min(gapBeforeDefer,maxDeferrable));
  const totalSources=beforeDefer+deferredFee;
  const fundingGap=totalUses-totalSources;
  const cashDevFee=devFee-deferredFee;
  return{land,hard,soft,devFee,cashDevFee,totalUses,ebPct,eligibleBasis,boostPct,boostedBasis,
    applicableFraction:af,qualifiedBasis,creditRate,annualCredit,tenYearCredits,creditPrice,
    lihtcEquity,softSources,permLoan,gapBeforeDefer,deferredFee,maxDeferrable,totalSources,fundingGap};
}

// ─── EQUITY WATERFALL (LP / GP promote) ───────────────────────────────────
// Standard real estate PE waterfall: return of capital + preferred return,
// then tiered promote splits at LP IRR hurdles. Tiers are LP IRR bands; the
// partnership cash in each band is split by the stated LP/GP share.
function calcWaterfall(res,inp){
  const hp=Math.min(Math.max(inp.holdingPeriod||7,1),10);
  const E=res.equity||0;
  if(E<=0)return null;
  const lpShare=(inp.lpSharePct!=null?inp.lpSharePct:90)/100;
  const gpShare=1-lpShare;
  const pref=(inp.prefRate!=null?inp.prefRate:8)/100;
  // tiers: ascending LP IRR hurdles with LP share of cash in each band.
  // Tier 1 = pref (pro-rata). Then promote tiers. Final tier = residual split.
  const h2=(inp.hurdle2!=null?inp.hurdle2:12)/100;
  const h3=(inp.hurdle3!=null?inp.hurdle3:15)/100;
  const s1=lpShare;                                   // through pref: pro-rata
  const s2=(inp.lpTier2!=null?inp.lpTier2:80)/100;    // pref -> h2
  const s3=(inp.lpTier3!=null?inp.lpTier3:70)/100;    // h2 -> h3
  const s4=(inp.lpTier4!=null?inp.lpTier4:60)/100;    // above h3
  const tiers=[{h:pref,sL:s1},{h:h2,sL:s2},{h:h3,sL:s3}];
  // partnership distributable cash each year (levered equity CF, positives only)
  const cash=[];
  for(let y=1;y<=hp;y++){
    const r=res.rows[y-1];
    let c=r?r.cfbt:0;
    if(y===hp)c+=res.exit?res.exit.proceeds:0;
    cash.push(Math.max(0,c));
  }
  // LP hurdle balances: amount LP must still receive to hit each hurdle.
  const lpBal=tiers.map(()=>lpShare*E);   // LP contributed lpShare*E at t0
  const lpDist=[], gpDist=[];
  for(let y=0;y<hp;y++){
    // accrue hurdle balances one year
    for(let i=0;i<tiers.length;i++)lpBal[i]*=(1+tiers[i].h);
    let avail=cash[y], lpY=0, gpY=0;
    for(let i=0;i<tiers.length&&avail>1e-9;i++){
      const room=Math.max(0,lpBal[i]);           // LP $ still needed to hit hurdle i
      if(room<=1e-9)continue;
      const tierCash=Math.min(avail, room/tiers[i].sL); // partnership cash; LP gets sL of it
      const lpCut=tierCash*tiers[i].sL, gpCut=tierCash-lpCut;
      lpY+=lpCut; gpY+=gpCut; avail-=tierCash;
      for(let j=0;j<tiers.length;j++)lpBal[j]-=lpCut; // LP cash counts toward all hurdles
    }
    if(avail>1e-9){ // residual above top hurdle
      lpY+=avail*s4; gpY+=avail*(1-s4);
      for(let j=0;j<tiers.length;j++)lpBal[j]-=avail*s4;
      avail=0;
    }
    lpDist.push(lpY); gpDist.push(gpY);
  }
  const lpEq=lpShare*E, gpEq=gpShare*E;
  const lpFlows=[-lpEq,...lpDist], gpFlows=[-gpEq,...gpDist];
  const lpTot=lpDist.reduce((a,b)=>a+b,0), gpTot=gpDist.reduce((a,b)=>a+b,0);
  const lpIRR=calcIRR(lpFlows), gpIRR=calcIRR(gpFlows);
  const gpPromote=gpTot-gpEq-(gpShare*(lpTot+gpTot)-gpEq); // GP take above its pro-rata share
  return{
    lpShare,gpShare,pref,tiers:[{label:'Preferred ('+(pref*100).toFixed(0)+'%)',sL:s1},
      {label:(pref*100).toFixed(0)+'% to '+(h2*100).toFixed(0)+'%',sL:s2},
      {label:(h2*100).toFixed(0)+'% to '+(h3*100).toFixed(0)+'%',sL:s3},
      {label:'Above '+(h3*100).toFixed(0)+'%',sL:s4}],
    lpEq,gpEq,lpTot,gpTot,lpDist,gpDist,
    lpIRR,gpIRR,
    lpEM:lpEq>0?lpTot/lpEq:0, gpEM:gpEq>0?gpTot/gpEq:0,
    lpProfit:lpTot-lpEq, gpProfit:gpTot-gpEq,
    gpPromote:Math.max(0,gpTot-gpShare*(lpTot+gpTot))
  };
}

// ─── AFTER-TAX CASH FLOW ───────────────────────────────────────────────────
// Depreciation shield on operating income, plus recapture and capital-gains
// tax at sale, producing an after-tax levered IRR.
function calcAfterTax(res,inp){
  const t=(inp.assetType||'').toLowerCase();
  if(t==='affordable')return null;
  const hp=Math.min(Math.max(inp.holdingPeriod||7,1),10);
  const isDev=t==='development';
  const costBasis=res.totalCost||0;
  const land=isDev?(inp.landCost||inp.purchasePrice||0):((inp.purchasePrice||0)*((inp.landPct!=null?inp.landPct:20)/100));
  const deprBasis=Math.max(0,costBasis-land);
  const depYears=inp.depYears!=null?inp.depYears:(t==='commercial'?39:27.5);
  const annualDep=depYears>0?deprBasis/depYears:0;
  const taxRate=(inp.taxRate!=null?inp.taxRate:37)/100;
  const capRate=(inp.capGainsRate!=null?inp.capGainsRate:20)/100;
  const recRate=(inp.recaptureRate!=null?inp.recaptureRate:25)/100;
  const loan0=Math.max(0,res.totalCost-res.equity);
  let prevBal=loan0, accumDep=0;
  const yrRows=[], atCF=[];
  for(let y=1;y<=hp;y++){
    const r=res.rows[y-1];
    const principal=Math.max(0,prevBal-r.bal);
    const interest=Math.max(0,r.ds-principal);
    const dep=Math.min(annualDep, y*annualDep>deprBasis?Math.max(0,deprBasis-accumDep):annualDep);
    accumDep+=dep;
    const taxable=r.noi-interest-dep;
    const tax=taxable*taxRate;
    const atcf=r.cfbt-tax;
    yrRows.push({yr:y,noi:r.noi,interest,dep,taxable,tax,cfbt:r.cfbt,atcf});
    atCF.push(atcf);
    prevBal=r.bal;
  }
  // sale
  const adjBasis=costBasis-accumDep;
  const saleGain=res.exit.netSale-adjBasis;
  const recaptureBase=Math.max(0,Math.min(accumDep,saleGain));
  const capGainBase=Math.max(0,saleGain-accumDep);
  const recaptureTax=recaptureBase*recRate;
  const capGainTax=capGainBase*capRate;
  const saleTax=recaptureTax+capGainTax;
  const atProceeds=res.exit.proceeds-saleTax;
  const flows=[-res.equity,...atCF.slice(0,hp-1),atCF[hp-1]+atProceeds];
  const atIRR=calcIRR(flows);
  const totAT=atCF.reduce((a,b)=>a+b,0)+atProceeds;
  return{
    deprBasis,depYears,annualDep,accumDep,taxRate,capRate,recRate,
    yrRows,
    adjBasis,saleGain,recaptureTax,capGainTax,saleTax,atProceeds,
    atIRR, atEM:res.equity>0?totAT/res.equity:0,
    preTaxIRR:res.ret.irr, preTaxEM:res.ret.em
  };
}

// ─── CONSTRUCTION & LEASE-UP TIMELINE ─────────────────────────────────────
// Honest project-level IRR for ground-up deals: equity sits idle during
// construction, income ramps through lease-up, and construction-period
// interest is capitalized, all of which the stabilized IRR ignores.
// Construction draw schedule with capitalized interest computed on the actual
// outstanding balance each month (straight-line or S-curve draw pattern).
function drawSchedule(loanAmt,months,mRate,pattern){
  if(months<=0||loanAmt<=0)return{capInterest:0,peakBalance:0,rows:[]};
  let weights=[];
  if(pattern==='scurve'){
    // bell-shaped draws, heaviest mid-construction
    let raw=[],sum=0;
    for(let m=1;m<=months;m++){const w=Math.sin(Math.PI*(m-0.5)/months);raw.push(w);sum+=w;}
    weights=raw.map(w=>w/sum);
  } else {
    weights=Array(months).fill(1/months); // straight-line
  }
  let bal=0,capInt=0,peak=0;const rows=[];
  for(let m=1;m<=months;m++){
    const draw=loanAmt*weights[m-1];
    bal+=draw;
    const interest=bal*mRate;   // interest on outstanding balance, capitalized
    bal+=interest; capInt+=interest;
    peak=Math.max(peak,bal);
    rows.push({month:m,draw,interest,balance:bal});
  }
  return{capInterest:capInt,peakBalance:peak,rows};
}

function calcProjectTimeline(res,inp){
  const t=(inp.assetType||'').toLowerCase();
  if(t!=='development')return null;
  const cM=Math.max(0,Math.round(inp.constructionPeriodMonths||0));
  const lM=Math.max(0,Math.round(inp.leaseUpMonths||0));
  const hp=Math.min(Math.max(inp.holdingPeriod||7,1),10);
  const equity=res.equity;
  const loan0=Math.max(0,res.totalCost-res.equity);
  const mRate=(inp.interestRate||0)/100/12;
  const draw=drawSchedule(loan0,cM,mRate,inp.drawPattern||'straight');
  const capInterest=draw.capInterest; // exact, from month-by-month draw schedule
  const cf=[-equity];
  for(let m=1;m<=cM;m++)cf.push(0);                 // construction: no income, interest capitalized
  const noiM=y=>res.rows[Math.min(y-1,res.rows.length-1)].noi/12;
  const dsM=y=>res.rows[Math.min(y-1,res.rows.length-1)].ds/12;
  for(let m=1;m<=lM;m++)cf.push(noiM(1)*(lM>0?m/lM:1)-dsM(1)); // lease-up ramp
  const stabMonths=hp*12;
  for(let m=1;m<=stabMonths;m++){const y=Math.ceil(m/12);cf.push(noiM(y)-dsM(y));}
  cf[cf.length-1]+=(res.exit.proceeds-capInterest);  // exit, payoff incl. capitalized interest
  const mIRR=calcIRR(cf);
  const projIRR=isFinite(mIRR)?Math.pow(1+mIRR,12)-1:NaN;
  const dist=cf.slice(1).reduce((a,b)=>a+b,0);
  return{
    constructionMonths:cM, leaseUpMonths:lM, totalMonths:cM+lM+stabMonths,
    capInterest, drawPattern:inp.drawPattern||'straight', constructionLoan:loan0,
    peakDrawBalance:draw.peakBalance, drawRows:draw.rows,
    stabilizedIRR:res.ret.irr, projectIRR:projIRR,
    projectEM:equity>0?(dist)/equity:0, stabilizedEM:res.ret.em
  };
}

// ─── REFINANCE / CASH-OUT EVENT ───────────────────────────────────────────
// Mid-hold refinance: a new loan is sized on the property's value at refi,
// the old loan is retired, net proceeds are returned to equity, and the
// remaining hold runs on the new debt. A pure overlay on the base result.
function calcRefinance(res,inp){
  const t=(inp.assetType||'').toLowerCase();
  if(!inp.refiEnabled||t==='affordable')return null;
  const hp=Math.min(Math.max(inp.holdingPeriod||7,1),10);
  const ry=Math.min(Math.max(Math.round(inp.refiYear||3),1),hp-1);
  const refiCap=(inp.refiCapRate!=null?inp.refiCapRate:(inp.exitCapRate||5.5))/100;
  const value=refiCap>0?res.rows[ry].noi/refiCap:0;
  const refiLTV=(inp.refiLTV!=null?inp.refiLTV:70)/100;
  const newLoan=Math.max(0,value*refiLTV);
  const oldBal=res.rows[ry-1].bal;
  const refiCosts=newLoan*((inp.refiCostPct!=null?inp.refiCostPct:1)/100);
  const cashOut=newLoan-oldBal-refiCosts;
  const newRate=(inp.refiRate!=null?inp.refiRate:(inp.interestRate||6))/100;
  const amort=inp.amortYears||30;
  const newDS=newLoan>0?monthlyPmt(newLoan,newRate,amort)*12:0;
  const newBalExit=loanBal(newLoan,newRate,amort,(hp-ry)*12);
  const equity=res.equity;
  const cf=[-equity];
  for(let y=1;y<=hp;y++){
    const ds=y<=ry?res.rows[y-1].ds:newDS;
    let c=res.rows[y-1].noi-ds;
    if(y===ry)c+=cashOut;
    if(y===hp)c+=(res.exit.netSale-newBalExit);
    cf.push(c);
  }
  const irr=calcIRR(cf);
  const dist=cf.slice(1).reduce((a,b)=>a+b,0);
  return{
    refiYear:ry,value,newLoan,oldBal,refiCosts,cashOut,newDS,newRate,amort,newBalExit,
    refiDSCR:newDS>0?res.rows[ry].noi/newDS:null,
    refiIRR:irr,baseIRR:res.ret.irr,refiEM:equity>0?dist/equity:0,baseEM:res.ret.em
  };
}

// ─── SCENARIO ANALYSIS (downside / base / upside) ─────────────────────────
// Flexes the two biggest value drivers (rent growth, exit cap) plus vacancy
// to bracket the base case. Pure overlay: each case is a fresh buildPF.
function calcScenarios(res,inp){
  if((inp.assetType||'').toLowerCase()==='affordable')return null;
  const gD=inp.scenGrowthDelta!=null?inp.scenGrowthDelta:1;
  const cD=inp.scenCapDelta!=null?inp.scenCapDelta:0.5;
  const vD=inp.scenVacDelta!=null?inp.scenVacDelta:2;
  const baseG=inp.revenueGrowth||0, baseC=inp.exitCapRate||0, baseV=inp.vacancyRate||0;
  const run=(g,c,v)=>{
    try{const r=buildPF({...inp,revenueGrowth:g,exitCapRate:c,vacancyRate:Math.max(0,v)});
      return{irr:r.ret.irr,em:r.ret.em,dscr:r.sum.dscr,coc:r.sum.coc,proceeds:r.exit.proceeds,g,c,v:Math.max(0,v)};}
    catch(e){return null;}
  };
  return{
    downside:run(baseG-gD,baseC+cD,baseV+vD),
    base:run(baseG,baseC,baseV),
    upside:run(baseG+gD,baseC-cD,baseV-vD),
    deltas:{g:gD,c:cD,v:vD}
  };
}

// ─── DEVELOPMENT TAX CREDITS (historic / brownfield / stacked) ────────────
// Each credit computed on its own basis x rate x syndication price. Credit
// equity stacks into development sources & uses as an additive overlay; the
// LIHTC module and base engine are untouched.
function calcDevCredits(res,inp){
  const src=inp.devCredits||[];
  if(!src.length)return null;
  const rows=src.map(r=>{
    const basis=+r.basis||0, ratePct=+r.rate||0, price=r.price!=null?+r.price:0.9;
    const credit=basis*(ratePct/100);
    return{type:r.type||'Other',basis,ratePct,price,credit,equity:credit*price};
  });
  const totalCredit=rows.reduce((a,b)=>a+b.credit,0);
  const totalEquity=rows.reduce((a,b)=>a+b.equity,0);
  const isAff=(inp.assetType||'').toLowerCase()==='affordable';
  const uses=res.totalCost||0;
  const loan=Math.max(0,(res.totalCost||0)-(res.equity||0));
  const lihtcEq=isAff&&res.lihtc?res.lihtc.lihtcEquity:0;
  const deferredFee=isAff&&res.lihtc?res.lihtc.deferredFee:0;
  const softSources=isAff&&res.lihtc?res.lihtc.softSources:0;
  const sponsorEquityBefore=isAff?Math.max(0,uses-loan-lihtcEq-deferredFee-softSources):(res.equity||0);
  const sponsorEquityAfter=Math.max(0,sponsorEquityBefore-totalEquity);
  let sponsorIRR=null, baseIRR=null;
  if(!isAff){
    baseIRR=res.ret.irr;
    const newEq=Math.max(1,(res.equity||0)-totalEquity);
    const hp=Math.min(Math.max(inp.holdingPeriod||7,1),10);
    const cf=[-newEq];
    for(let y=1;y<=hp;y++){let c=res.rows[y-1].cfbt;if(y===hp)c+=res.exit.proceeds;cf.push(c);}
    sponsorIRR=calcIRR(cf);
  }
  return{rows,totalCredit,totalEquity,uses,loan,lihtcEq,deferredFee,softSources,sponsorEquityBefore,sponsorEquityAfter,sponsorIRR,baseIRR,isAff};
}

function buildPF(inp){
  const gpi0=getGPI(inp);
  const opex0=getOpEx(inp);
  const vac=inp.vacancyRate||0;
  const PP=inp.purchasePrice||0;
  const acqC=PP*(inp.acquisitionCostsPct||0)/100;
  const tEarly=(inp.assetType||'').toLowerCase();
  const isAff=tEarly==='affordable';
  const IRe=inp.interestRate||0, AYe=inp.amortYears||30;
  const noi0=(gpi0*(1-vac/100)+(inp.otherIncome||0))-opex0;
  let LA=inp.loanAmount||0;
  let lihtc=null, debtSizing=null;
  if(isAff){
    const constant=monthlyPmt(1,IRe/100,AYe)*12;
    const minDSCR=inp.minDSCR||1.15;
    LA=constant>0?Math.max(0,(noi0/minDSCR)/constant):0;
    lihtc=calcLIHTC(inp,LA);
  } else if(inp.sizeDebt){
    const constant=monthlyPmt(1,IRe/100,AYe)*12;
    const isDev=tEarly==='development';
    const valueBasis=isDev?getDevCost(inp):PP;
    const cons=[];
    if((inp.minDSCR||0)>0&&constant>0)cons.push({name:'DSCR',basis:'min '+(inp.minDSCR).toFixed(2)+'x',loan:(noi0/inp.minDSCR)/constant});
    if((inp.minDebtYield||0)>0)cons.push({name:'Debt Yield',basis:'min '+(inp.minDebtYield).toFixed(1)+'%',loan:noi0/((inp.minDebtYield)/100)});
    if(isDev){if((inp.maxLTC||0)>0)cons.push({name:'LTC',basis:'max '+(inp.maxLTC).toFixed(0)+'%',loan:valueBasis*(inp.maxLTC/100)});}
    else{if((inp.maxLTV||0)>0)cons.push({name:'LTV',basis:'max '+(inp.maxLTV).toFixed(0)+'%',loan:valueBasis*(inp.maxLTV/100)});}
    if(cons.length){
      const binding=cons.reduce((a,b)=>b.loan<a.loan?b:a);
      LA=Math.max(0,binding.loan);
      debtSizing={constraints:cons.map(c=>({...c,loan:Math.max(0,c.loan),binds:c.name===binding.name})),binding:binding.name,sizedLoan:LA,valueBasis,noi0};
    }
  }
  const LF=LA*(inp.loanFeesPct||0)/100;
  const devCostEarly=(tEarly==='development'||isAff)?getDevCost(inp):0;
  const baseCost=(tEarly==='development'||isAff)?devCostEarly:PP;
  const capBasis=baseCost;
  const totalCost=baseCost+acqC+LF;
  const equity=totalCost-LA;
  const IR=inp.interestRate||0;
  const AY=inp.amortYears||30;
  const IO=inp.ioPeriod||0;
  const pmt12=monthlyPmt(LA,IR/100,AY)*12;
  const ioAnnual=LA*(IR/100);
  const hp=Math.min(Math.max(inp.holdingPeriod||7,1),10);
  const rg=inp.revenueGrowth||3;
  const eg=inp.expenseGrowth||2.5;
  const eCapR=(inp.exitCapRate||5.5)/100;
  const sellC=(inp.sellingCostsPct||3)/100;
  const dr=(inp.discountRate||8)/100;
  const t=inp.assetType.toLowerCase();
  const devCost=(t==='development'||t==='affordable')?getDevCost(inp):0;

  const rows=[];
  for(let yr=1;yr<=11;yr++){
    const rm=Math.pow(1+rg/100,yr-1);
    const em=Math.pow(1+eg/100,yr-1);
    const gpi=gpi0*rm;
    const vacL=gpi*vac/100;
    const egi=gpi-vacL+(inp.otherIncome||0)*rm;
    const mgmt=egi*(inp.managementFeePct||0)/100;
    const opex=(opex0-((getGPI(inp)*(1-vac/100)+(inp.otherIncome||0))*(inp.managementFeePct||0)/100))*em+mgmt;
    const noi=egi-opex;
    const isIO=yr<=IO;
    const monthsPaid=isIO?0:(yr-IO)*12;
    const bal=loanBal(LA,IR/100,AY,monthsPaid);
    const ds=LA>0?(isIO?ioAnnual:pmt12):0;
    const cfbt=noi-ds;
    const capR=capBasis>0?noi/capBasis:0;
    const coc=equity>0?cfbt/equity:0;
    const dscr=ds>0?noi/ds:null;
    const expR=egi>0?opex/egi:0;
    rows.push({yr,gpi,vacL,egi,opex,noi,ds,cfbt,capR,coc,dscr,bal,expR,mgmt});
  }

  const ex=rows[hp-1];
  const exitNOI=rows[hp].noi;
  const grossSale=eCapR>0?exitNOI/eCapR:0;
  const sellAmt=grossSale*sellC;
  const netSale=grossSale-sellAmt;
  const payoff=ex.bal;
  const proceeds=netSale-payoff;
  const totalCF=rows.slice(0,hp).reduce((s,r)=>s+r.cfbt,0);
  const profit=totalCF+proceeds-equity;
  const em2=equity>0?(totalCF+proceeds)/equity:0;
  const irrFlows=[-equity,...rows.slice(0,hp-1).map(r=>r.cfbt),rows[hp-1].cfbt+proceeds];
  const irr=calcIRR(irrFlows);
  const npv=calcNPV(irrFlows,dr);
  const y1=rows[0];
  const beOcc=y1.gpi>0?Math.max(0,(y1.opex+y1.ds)/y1.gpi):0;
  const retOnCost=devCost>0?y1.noi/devCost:0;

  return{inp,equity,totalCost,acqC,LF,rows,
    exit:{grossSale,sellAmt,netSale,payoff,proceeds},
    ret:{irr,em:em2,npv,profit,totalCF,retOnCost},
    sum:{capR:y1.capR,coc:y1.coc,dscr:y1.dscr,noi:y1.noi,cf:y1.cfbt,beOcc,devCost},lihtc,debtSizing};
}

// ─── EXCEL EXPORT ────────────────────────────────────────────────────────
async function buildWorkbook(res,inp,withResults=true){
  const E=window.ExcelJS;
  const hp=Math.min(Math.max(inp.holdingPeriod||7,1),10);
  const t=(inp.assetType||'').toLowerCase();
  const isDev=t==='development';
  const name=inp.propertyName||'Untitled Property';
  const wb=new E.Workbook();
  wb.creator='CapStack';wb.created=new Date();

  const NAVY='FF1F3864',NAVY2='FF2E4F87',HDR='FFD9E1F2',BAND='FFF7F7F7',WHITE='FFFFFFFF',FWDBG='FFF0F0EE';
  const GREENBG='FFE2EFDA',AMBERBG='FFFFF2CC',REDBG='FFFBE0DE';
  const thin={style:'thin',color:{argb:'FFD0D0D0'}};
  const box={top:thin,left:thin,bottom:thin,right:thin};
  const boxT={top:{style:'thin',color:{argb:'FF1F3864'}},left:thin,bottom:thin,right:thin};
  const F$='$#,##0';const F$N='$#,##0;($#,##0)';const FP='0.0%';const FP2='0.00%';const FX='0.00"x"';const FN='#,##0';
  const fill=c=>({type:'pattern',pattern:'solid',fgColor:{argb:c}});
  const lblF={name:'Calibri',size:10,color:{argb:'FF333333'}};
  const inpF={name:'Calibri',size:10,bold:true,color:{argb:'FF0070C0'}};
  const fmlF={name:'Calibri',size:10,bold:true,color:{argb:'FF1F1F1F'}};
  const CL=i=>String.fromCharCode(64+i);
  const fml=(f,r)=>withResults&&isFinite(r)?{formula:f,result:r}:{formula:f};

  const banner=(ws,row,c1,c2,text,sub)=>{
    ws.mergeCells(row,c1,row,c2);
    Object.assign(ws.getCell(row,c1),{value:text,font:{name:'Calibri',size:14,bold:true,color:{argb:WHITE}},fill:fill(NAVY),alignment:{vertical:'middle',horizontal:'left',indent:1}});
    ws.getRow(row).height=27;
    ws.mergeCells(row+1,c1,row+1,c2);
    Object.assign(ws.getCell(row+1,c1),{value:sub,font:{name:'Calibri',size:9.5,italic:true,color:{argb:WHITE}},fill:fill(NAVY2),alignment:{vertical:'middle',horizontal:'left',indent:1}});
    ws.getRow(row+1).height=16;
  };

  // ============ SUMMARY ============
  const ws=wb.addWorksheet('Summary',{views:[{showGridLines:false}]});
  ws.columns=[{width:2},{width:28},{width:15},{width:2.5},{width:28},{width:15},{width:2}];
  banner(ws,2,2,6,name.toUpperCase(),`${inp.assetType} Investment Analysis  |  ${hp}-Year Hold  |  Blue cells are inputs, black cells are live formulas  |  Prepared ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}`);

  let rL=5,rR=5;
  const refs={};
  // entry: [key|null, label, value|{f,r}, fmt, isInput]
  const block=(side,title,entries)=>{
    const c1=side==='L'?2:5,c2=c1+1;
    let r=side==='L'?rL:rR;
    ws.mergeCells(r,c1,r,c2);
    Object.assign(ws.getCell(r,c1),{value:title,font:{name:'Calibri',size:10,bold:true,color:{argb:'FF1F3864'}},fill:fill(HDR),alignment:{vertical:'middle',indent:1},border:box});
    ws.getRow(r).height=17;r++;
    entries.forEach((e,i)=>{
      const[key,label,val,fm,isInput]=e;
      const cl=ws.getCell(r,c1),cv=ws.getCell(r,c2);
      cl.value=label;cl.font=lblF;cl.border=box;cl.alignment={indent:1};
      if(val&&typeof val==='object'&&val.f!==undefined){cv.value=fml(val.f,val.r);}else{cv.value=val;}
      cv.font=isInput?inpF:fmlF;cv.border=box;cv.alignment={horizontal:'right'};
      if(fm)cv.numFmt=fm;
      if(i%2===1){cl.fill=fill(BAND);cv.fill=fill(BAND);}
      if(key)refs[key]='Summary!$'+CL(c2)+'$'+r;
      r++;
    });
    r++;
    if(side==='L')rL=r;else rR=r;
  };

  // engine-derived values for caching
  const R0=res.rows[0];
  const gpi1=R0.gpi, oth1=R0.egi-(R0.gpi-R0.vacL);
  const baseExM=R0.opex-R0.mgmt;
  const basisVal=isDev?getDevCost(inp):(inp.purchasePrice||0);
  const LA=inp.loanAmount||0, IR=(inp.interestRate||0)/100, AY=inp.amortYears||30, IO=inp.ioPeriod||0;
  const ltvVal=basisVal>0?LA/basisVal:0;
  const sizeLine=isDev?[null,'Gross Buildable SF',inp.grossBuildableSF||0,FN,true]:(t==='commercial'?[null,'Total SF',inp.totalSF||0,FN,true]:[null,'Units',inp.numUnits||0,FN,true]);

  const pdRows=[
    [null,'Asset Type',inp.assetType,null,true],sizeLine,
    ['price',isDev?'Land Cost':'Purchase Price',inp.purchasePrice||0,F$,true],
  ];
  if(isDev)pdRows.push(['basis','Total Development Cost (incl. land)',basisVal,F$,true]);
  block('L','PROPERTY & DEAL',pdRows.concat([
    ['acq','Acquisition Costs',{f:'0',r:0},F$,false],
    ['fees','Loan Fees',{f:'X',r:0},F$,false],
    ['tcap','Total Capitalization',{f:'X',r:res.totalCost},F$,false],
    ['hold','Holding Period (Years)',hp,FN,true],
    ['ecap','Exit Cap Rate',(inp.exitCapRate||0)/100,FP2,true],
    ['sell','Selling Costs',(inp.sellingCostsPct||0)/100,FP,true],
  ]));
  if(!isDev)refs.basis=refs.price;
  block('L','FINANCING',[
    ['loan','Loan Amount',LA,F$,true],
    ['ltv',isDev?'Loan-to-Cost':'Loan-to-Value',{f:'X',r:ltvVal},FP,false],
    ['rate','Interest Rate',IR,FP2,true],
    ['amort','Amortization (Years)',AY,FN,true],
    ['io','Interest-Only Period (Years)',IO,FN,true],
    ['eq','Equity Required',{f:'X',r:res.equity},F$,false],
  ]);
  block('L','MODEL ASSUMPTIONS',[
    ['gpi1','Gross Potential Income (Yr 1)',Math.round(gpi1),F$,true],
    ['oth1','Other Income (Yr 1)',Math.round(oth1),F$,true],
    ['vac','Vacancy & Credit Loss',(inp.vacancyRate||0)/100,FP,true],
    ['exm','OpEx excl. Mgmt (Yr 1)',Math.round(baseExM),F$,true],
    ['mgmt','Management Fee (% of EGI)',(inp.managementFeePct||0)/100,FP,true],
    ['rg','Revenue Growth (Annual)',(inp.revenueGrowth||0)/100,FP,true],
    ['eg','Expense Growth (Annual)',(inp.expenseGrowth||0)/100,FP,true],
    ['acqp','Acquisition Costs (% of Price)',(inp.acquisitionCostsPct||0)/100,FP,true],
    ['feep','Loan Fees (% of Loan)',(inp.loanFeesPct||0)/100,FP,true],
    ['disc','Discount Rate (NPV)',(inp.discountRate||0)/100,FP,true],
  ]);
  // wire left-side formulas now that refs exist
  const setRef=(key,f,r,fmt)=>{const a=refs[key].replace('Summary!','').replace(/\$/g,'');const c=ws.getCell(a);c.value=fml(f,r);if(fmt)c.numFmt=fmt;};
  setRef('acq',`${refs.price}*${refs.acqp}`,res.acqC);
  setRef('fees',`${refs.loan}*${refs.feep}`,res.LF);
  setRef('tcap',`${refs.basis}+${refs.acq}+${refs.fees}`,res.totalCost);
  setRef('ltv',`IF(${refs.basis}=0,0,${refs.loan}/${refs.basis})`,ltvVal);
  setRef('eq',`${refs.tcap}-${refs.loan}`,res.equity);

  // ============ ANNUAL PRO FORMA (formula-driven) ============
  const pf=wb.addWorksheet('Annual Pro Forma',{views:[{showGridLines:false,state:'frozen',xSplit:2,ySplit:3}]});
  const fwdC=4+hp; // col index of forward year
  pf.columns=[{width:2},{width:30},{width:12}].concat(Array.from({length:hp+1},()=>({width:13})));
  pf.mergeCells(2,2,2,fwdC);
  Object.assign(pf.getCell(2,2),{value:name.toUpperCase()+'  |  '+hp+'-YEAR OPERATING PRO FORMA (LIVE FORMULAS)',font:{name:'Calibri',size:12,bold:true,color:{argb:WHITE}},fill:fill(NAVY),alignment:{vertical:'middle',indent:1}});
  pf.getRow(2).height=24;
  const hr=pf.getRow(3);
  for(let c=2;c<=fwdC;c++){
    const cell=hr.getCell(c);
    cell.value=c===2?'':(c===3?'Year 0':(c===fwdC?`Yr ${hp+1} (Fwd)`:'Year '+(c-3)));
    cell.font={name:'Calibri',size:10,bold:true,color:{argb:WHITE}};
    cell.fill=fill(NAVY2);cell.border=box;cell.alignment={horizontal:c===2?'left':'right'};
  }
  hr.height=17;
  let pr=4;
  const rowIdx={};
  const sect=ttl=>{
    pf.mergeCells(pr,2,pr,fwdC);
    Object.assign(pf.getCell(pr,2),{value:ttl,font:{name:'Calibri',size:9.5,bold:true,color:{argb:'FF1F3864'}},fill:fill(HDR),alignment:{indent:1},border:box});
    pf.getRow(pr).height=16;pr++;
  };
  // cells: array over columns 3..fwdC; entry null=blank, number=value, {f,r}=formula
  const line=(key,label,cells,fm,opts)=>{
    opts=opts||{};
    const row=pf.getRow(pr);
    const cl=row.getCell(2);
    cl.value=label;cl.border=opts.total?boxT:box;cl.alignment={indent:opts.total?1:2};
    cl.font={name:'Calibri',size:10,bold:!!opts.total,color:{argb:opts.total?'FF1F3864':'FF333333'}};
    cells.forEach((v,i)=>{
      const c=row.getCell(3+i);
      c.border=opts.total?boxT:box;c.alignment={horizontal:'right'};
      c.font={name:'Calibri',size:10,bold:!!opts.total,color:{argb:opts.total?'FF1F3864':'FF333333'}};
      if(3+i===fwdC&&!opts.noFwdShade)c.fill=fill(FWDBG);
      if(v===null||v===undefined)return;
      if(typeof v==='object'){c.value=fml(v.f,v.r);}else{c.value=v;}
      if(fm)c.numFmt=fm;
    });
    if(key)rowIdx[key]=pr;
    pr++;
  };
  const ER=res.rows; // engine rows, 11 entries
  // helper builders: yr = 1..hp+1 maps to col 3+yr; prev col letter
  const yrs=Array.from({length:hp+1},(_,i)=>i+1); // includes forward year
  const colOf=yr=>CL(3+yr);
  const opsRow=(key,label,firstF,firstR,growF,vals,fm,opts)=>{
    const cells=[null].concat(yrs.map(yr=>{
      if(yr===1)return{f:firstF,r:firstR};
      const p=colOf(yr-1)+rowIdx_pending(key);
      return{f:growF(yr,p),r:vals(yr)};
    }));
    line(key,label,cells,fm,opts);
  };
  // since rowIdx[key] not known until line() called, we compute target row = pr at call time:
  function rowIdx_pending(){return pr;}

  sect('REVENUE');
  opsRow('gpi','Gross Potential Income',`${refs.gpi1}`,gpi1,(yr,p)=>`${p}*(1+${refs.rg})`,yr=>ER[yr-1].gpi,F$);
  line('vac','Less: Vacancy & Credit Loss',[null].concat(yrs.map(yr=>({f:`-${colOf(yr)}${rowIdx.gpi}*${refs.vac}`,r:-ER[yr-1].vacL}))),F$N);
  opsRow('oth','Plus: Other Income',`${refs.oth1}`,oth1,(yr,p)=>`${p}*(1+${refs.rg})`,yr=>oth1*Math.pow(1+(inp.revenueGrowth||0)/100,yr-1),F$);
  line('egi','Effective Gross Income',[null].concat(yrs.map(yr=>({f:`${colOf(yr)}${rowIdx.gpi}+${colOf(yr)}${rowIdx.vac}+${colOf(yr)}${rowIdx.oth}`,r:ER[yr-1].egi}))),F$,{total:true});
  sect('OPERATING EXPENSES');
  opsRow('exm','OpEx excl. Management',`-${refs.exm}`,-baseExM,(yr,p)=>`${p}*(1+${refs.eg})`,yr=>-(baseExM*Math.pow(1+(inp.expenseGrowth||0)/100,yr-1)),F$N);
  line('mgmt','Management Fee',[null].concat(yrs.map(yr=>({f:`-${colOf(yr)}${rowIdx.egi}*${refs.mgmt}`,r:-ER[yr-1].mgmt}))),F$N);
  line('opx','Total Operating Expenses',[null].concat(yrs.map(yr=>({f:`${colOf(yr)}${rowIdx.exm}+${colOf(yr)}${rowIdx.mgmt}`,r:-ER[yr-1].opex}))),F$N,{total:true});
  line('noi','Net Operating Income',[null].concat(yrs.map(yr=>({f:`${colOf(yr)}${rowIdx.egi}+${colOf(yr)}${rowIdx.opx}`,r:ER[yr-1].noi}))),F$,{total:true});
  sect('DEBT SERVICE');
  const dsF=yr=>`-IF(${refs.loan}=0,0,IF(${yr}<=${refs.io},${refs.loan}*${refs.rate},IF(${refs.rate}=0,${refs.loan}/${refs.amort},${refs.loan}*${refs.rate}/12/(1-(1+${refs.rate}/12)^(-${refs.amort}*12))*12)))`;
  line('ds','Annual Debt Service',[null].concat(yrs.map(yr=>yr<=hp?{f:dsF(yr),r:-ER[yr-1].ds}:null)),F$N);
  line('cfbt','Cash Flow Before Tax',[null].concat(yrs.map(yr=>yr<=hp?{f:`${colOf(yr)}${rowIdx.noi}+${colOf(yr)}${rowIdx.ds}`,r:ER[yr-1].cfbt}:null)),F$,{total:true});
  sect('RATIOS & BALANCES');
  line('cap','Cap Rate',[null].concat(yrs.map(yr=>yr<=hp?{f:`${colOf(yr)}${rowIdx.noi}/${refs.basis}`,r:ER[yr-1].capR}:null)),FP2);
  line('coc','Cash-on-Cash Return',[null].concat(yrs.map(yr=>yr<=hp?{f:`IF(${refs.eq}=0,0,${colOf(yr)}${rowIdx.cfbt}/${refs.eq})`,r:ER[yr-1].coc}:null)),FP2);
  line('dscr','DSCR',[null].concat(yrs.map(yr=>yr<=hp?{f:`IF(${colOf(yr)}${rowIdx.ds}=0,"N/A",${colOf(yr)}${rowIdx.noi}/(-${colOf(yr)}${rowIdx.ds}))`,r:ER[yr-1].dscr||NaN}:null)),FX);
  const balF=yr=>`IF(${refs.loan}=0,0,IF(${yr}<=${refs.io},${refs.loan},IF(${refs.rate}=0,MAX(0,${refs.loan}-${refs.loan}/(${refs.amort}*12)*((${yr}-${refs.io})*12)),MAX(0,${refs.loan}*(1+${refs.rate}/12)^((${yr}-${refs.io})*12)-(${refs.loan}*${refs.rate}/12/(1-(1+${refs.rate}/12)^(-${refs.amort}*12)))*((1+${refs.rate}/12)^((${yr}-${refs.io})*12)-1)/(${refs.rate}/12)))))`;
  line('bal','Ending Loan Balance',[null].concat(yrs.map(yr=>yr<=hp?{f:balF(yr),r:ER[yr-1].bal}:null)),F$);
  sect('LEVERED INVESTMENT CASH FLOWS');
  line('init','Initial Equity Investment',[{f:`-${refs.eq}`,r:-res.equity}].concat(yrs.map(()=>null)),F$N);
  line('opcf','Operating Cash Flow',[null].concat(yrs.map(yr=>yr<=hp?{f:`${colOf(yr)}${rowIdx.cfbt}`,r:ER[yr-1].cfbt}:null)),F$N);
  line('sale','Net Sale Proceeds',[null].concat(yrs.map(yr=>yr<hp?0:(yr===hp?{f:'X',r:res.exit.proceeds}:null))),F$N);
  line('net','Levered Net Cash Flow',[{f:`C${rowIdx.init}`,r:-res.equity}].concat(yrs.map(yr=>yr<=hp?{f:`${colOf(yr)}${rowIdx.opcf}+${colOf(yr)}${rowIdx.sale}`,r:ER[yr-1].cfbt+(yr===hp?res.exit.proceeds:0)}:null)),F$N,{total:true});

  const PFQ="'Annual Pro Forma'!";
  const lastYr=colOf(hp), fwdL=CL(fwdC);

  // ============ SUMMARY right-side blocks (live formulas) ============
  block('R','RETURN SUMMARY',[
    [null,'Levered IRR',{f:`IRR(${PFQ}$C$${rowIdx.net}:$${lastYr}$${rowIdx.net})`,r:res.ret.irr},FP,false],
    [null,'Equity Multiple',{f:`IF(${refs.eq}=0,0,SUM(${PFQ}$D$${rowIdx.net}:$${lastYr}$${rowIdx.net})/${refs.eq})`,r:res.ret.em},FX,false],
    [null,'Net Present Value',{f:`${PFQ}$C$${rowIdx.net}+NPV(${refs.disc},${PFQ}$D$${rowIdx.net}:$${lastYr}$${rowIdx.net})`,r:res.ret.npv},F$N,false],
    [null,'Total Profit',{f:`SUM(${PFQ}$C$${rowIdx.net}:$${lastYr}$${rowIdx.net})`,r:res.ret.profit},F$N,false],
    [null,'Year 1 Cash-on-Cash',{f:`${PFQ}$D$${rowIdx.coc}`,r:res.sum.coc},FP,false],
    [null,'Year 1 Cap Rate',{f:`${PFQ}$D$${rowIdx.cap}`,r:res.sum.capR},FP2,false],
    [null,'Year 1 DSCR',{f:`${PFQ}$D$${rowIdx.dscr}`,r:res.sum.dscr||NaN},FX,false],
    [null,'Break-Even Occupancy',{f:`IF(${PFQ}$D$${rowIdx.gpi}=0,0,(-${PFQ}$D$${rowIdx.opx}-${PFQ}$D$${rowIdx.ds})/${PFQ}$D$${rowIdx.gpi})`,r:res.sum.beOcc},FP,false],
  ]);
  block('R','EXIT ANALYSIS (YEAR '+hp+')',[
    ['fnoi','Forward NOI (Year '+(hp+1)+')',{f:`${PFQ}$${fwdL}$${rowIdx.noi}`,r:res.rows[hp].noi},F$,false],
    ['gross','Gross Sale Price',{f:'X',r:res.exit.grossSale},F$,false],
    ['scost','Selling Costs',{f:'X',r:-res.exit.sellAmt},F$N,false],
    ['nsale','Net Sale Price',{f:'X',r:res.exit.netSale},F$,false],
    ['poff','Loan Payoff',{f:`-${PFQ}$${lastYr}$${rowIdx.bal}`,r:-res.exit.payoff},F$N,false],
    ['proc','Net Sale Proceeds',{f:'X',r:res.exit.proceeds},F$,false],
  ]);
  setRef('gross',`IF(${refs.ecap}=0,0,${refs.fnoi}/${refs.ecap})`,res.exit.grossSale);
  setRef('scost',`-${refs.gross}*${refs.sell}`,-res.exit.sellAmt);
  setRef('nsale',`${refs.gross}+${refs.scost}`,res.exit.netSale);
  setRef('proc',`${refs.nsale}+${refs.poff}`,res.exit.proceeds);
  block('R','SOURCES & USES',[
    [null,'Senior Loan',{f:`${refs.loan}`,r:LA},F$,false],
    [null,'Sponsor Equity',{f:`${refs.eq}`,r:res.equity},F$,false],
    [null,'Total Sources',{f:`${refs.loan}+${refs.eq}`,r:res.totalCost},F$,false],
    [null,basisLblTxt(isDev),{f:`${refs.basis}`,r:basisVal},F$,false],
    [null,'Closing Costs & Fees',{f:`${refs.acq}+${refs.fees}`,r:res.acqC+res.LF},F$,false],
    [null,'Total Uses',{f:`${refs.tcap}`,r:res.totalCost},F$,false],
  ]);
  function basisLblTxt(d){return d?'Total Development Cost':'Purchase Price';}
  // wire the PF sale cell to Summary proceeds now that ref exists
  pf.getCell(rowIdx.sale,3+hp).value=fml(`${refs.proc}`,res.exit.proceeds);
  pf.getCell(rowIdx.sale,3+hp).numFmt=F$N;

  const fr=Math.max(rL,rR)+1;
  ws.mergeCells(fr,2,fr,6);
  Object.assign(ws.getCell(fr,2),{value:'Prepared with CapStack. All outputs above are live Excel formulas; change any blue input cell and the model recalculates. Projections are estimates for informational purposes only and do not constitute investment advice.',font:{name:'Calibri',size:8.5,italic:true,color:{argb:'FF808080'}}});

  // ============ SENSITIVITY ============
  const sn=wb.addWorksheet('Sensitivity',{views:[{showGridLines:false}]});
  const growths=[1,2,3,4,5],caps=[4.5,5.0,5.5,6.0,6.5,7.0];
  const nC=caps.length, lastCol=2+nC;
  sn.columns=[{width:2},{width:22}].concat(caps.map(()=>({width:11})));
  banner(sn,2,2,lastCol,'LEVERED IRR SENSITIVITY','How the deal\'s levered IRR moves with revenue growth and exit cap rate. All other inputs held constant.');

  // Column-axis label band: EXIT CAP RATE -> spanning the cap columns
  sn.mergeCells(4,3,4,lastCol);
  Object.assign(sn.getCell(4,3),{value:'EXIT CAP RATE \u2192',font:{name:'Calibri',size:9.5,bold:true,color:{argb:'FF1F3864'}},fill:fill(HDR),alignment:{horizontal:'center'},border:box});
  sn.getCell(4,2).border=box; sn.getCell(4,2).fill=fill(HDR);

  // Header row: corner label + editable cap values
  const sh=sn.getRow(5);
  Object.assign(sh.getCell(2),{value:'Rev Growth \u2193  /  Exit Cap \u2192',font:{name:'Calibri',size:9,bold:true,italic:true,color:{argb:WHITE}},fill:fill(NAVY2),border:box,alignment:{horizontal:'center',wrapText:true}});
  caps.forEach((c,i)=>{
    const cc=sh.getCell(3+i);
    cc.value=c/100;cc.numFmt=FP2;
    Object.assign(cc,{font:{name:'Calibri',size:11,bold:true,color:{argb:'FF0070C0'}},fill:fill('FFEAF1FB'),border:box,alignment:{horizontal:'center'}});
  });
  sh.height=26;

  // Live IRR sensitivity: each grid cell is a real =IRR() over a hidden
  // per-scenario cash flow built from the editable axis cells + Summary inputs.
  const lr=6+growths.length+1;
  const CB=lr+4;                 // first row of the hidden calc block
  const noiF=(G,k)=>`(((${refs.gpi1}*(1-${refs.vac})+${refs.oth1})*(1+${G})^${k-1})*(1-${refs.mgmt})-${refs.exm}*(1+${refs.eg})^${k-1})`;
  const dsRef=k=>`'Annual Pro Forma'!${CL(3+k)}${rowIdx.ds}`;
  const balRef=`'Annual Pro Forma'!${CL(3+hp)}${rowIdx.bal}`;

  growths.forEach((g,gi)=>{
    const row=sn.getRow(6+gi);
    const lc=row.getCell(2);
    lc.value=g/100;lc.numFmt=FP;
    Object.assign(lc,{font:{name:'Calibri',size:11,bold:true,color:{argb:'FF0070C0'}},fill:fill('FFEAF1FB'),border:box,alignment:{horizontal:'center'}});
    const G=`$B$${6+gi}`;
    caps.forEach((c,ci)=>{
      const C=`${CL(3+ci)}$5`;
      const calcRow=CB+gi*nC+ci;
      sn.getCell(calcRow,2).value={formula:`-${refs.eq}`};
      sn.getCell(calcRow,2).numFmt=F$N;
      for(let k=1;k<=hp;k++){
        let fla=`${noiF(G,k)}+${dsRef(k)}`;
        if(k===hp){
          const sale=`(${noiF(G,hp+1)})/${C}*(1-${refs.sell})-${balRef}`;
          fla=`${fla}+(${sale})`;
        }
        const cc=sn.getCell(calcRow,2+k);
        cc.value={formula:fla}; cc.numFmt=F$N;
      }
      const irrSnap=buildPF(Object.assign({},inp,{revenueGrowth:g,exitCapRate:c})).ret.irr;
      const rng=`B${calcRow}:${CL(2+hp)}${calcRow}`;
      const cell=row.getCell(3+ci);
      cell.value=isFinite(irrSnap)?{formula:`IRR(${rng})`,result:irrSnap}:{formula:`IRR(${rng})`};
      cell.numFmt=FP;cell.border=box;cell.alignment={horizontal:'center'};
      const bg=irrSnap>0.15?GREENBG:irrSnap>0.10?AMBERBG:REDBG;
      const fc=irrSnap>0.15?'FF1A7F37':irrSnap>0.10?'FF9A6700':'FFB42318';
      cell.fill=fill(bg);cell.font={name:'Calibri',size:10.5,bold:true,color:{argb:fc}};
    });
  });

  // hidden calc block label
  Object.assign(sn.getCell(CB-1,2),{value:'Sensitivity calculation \u2014 live scenario cash flows (auto-generated, do not edit)',font:{name:'Calibri',size:8,italic:true,color:{argb:'FFB0B0B0'}}});
  for(let si=0;si<growths.length*nC;si++)sn.getRow(CB+si).hidden=true;

  // ============ EXTRA ANALYSIS SHEETS ============
  const FPx='0%';
  const simpleSheet=(nm,title,sub,sections)=>{
    const sh=wb.addWorksheet(nm,{views:[{showGridLines:false}]});
    sh.columns=[{width:2},{width:36},{width:20},{width:2}];
    banner(sh,2,2,3,title,sub);
    let r=5;
    sections.forEach(sec=>{
      sh.mergeCells(r,2,r,3);
      Object.assign(sh.getCell(r,2),{value:sec.title,font:{name:'Calibri',size:10,bold:true,color:{argb:'FF1F3864'}},fill:fill(HDR),border:box,alignment:{indent:1,vertical:'middle'}});
      sh.getRow(r).height=16;r++;
      sec.rows.forEach(rw=>{
        const[label,val,fm,bold]=rw;
        Object.assign(sh.getCell(r,2),{value:label,font:{name:'Calibri',size:10,bold:!!bold},border:box,alignment:{indent:1}});
        const c=sh.getCell(r,3);c.value=val;if(fm)c.numFmt=fm;
        Object.assign(c,{font:{name:'Calibri',size:10,bold:!!bold},border:box,alignment:{horizontal:'right'}});
        r++;
      });
      r++;
    });
    return sh;
  };

  if(res.lihtc){const L=res.lihtc;
    simpleSheet('LIHTC Analysis','LIHTC & SYNDICATION','Tax-credit equity, sources and uses',[
      {title:'TAX CREDIT CALCULATION',rows:[
        ['Eligible basis ('+(L.ebPct*100).toFixed(0)+'% of hard+soft+fee)',L.eligibleBasis,F$],
        ['Basis boost (QCT/DDA)',L.boostPct/100,FPx],
        ['Boosted eligible basis',L.boostedBasis,F$],
        ['Applicable fraction',L.applicableFraction,FPx],
        ['Qualified basis',L.qualifiedBasis,F$,true],
        ['Credit rate',L.creditRate,FP2],
        ['Annual credit',L.annualCredit,F$],
        ['10-year credits',L.tenYearCredits,F$],
        ['Credit price (per $1)',L.creditPrice,'$0.000'],
        ['LIHTC equity',L.lihtcEquity,F$,true],
      ]},
      {title:'SOURCES',rows:[
        ['Permanent loan (DSCR-sized)',L.permLoan,F$],
        ['LIHTC equity',L.lihtcEquity,F$],
        ['Soft sources / subsidy',L.softSources,F$],
        ['Deferred developer fee',L.deferredFee,F$],
        ['Total sources',L.totalSources,F$,true],
      ]},
      {title:'USES',rows:[
        ['Land',L.land,F$],['Hard costs',L.hard,F$],['Soft costs',L.soft,F$],
        ['Developer fee',L.devFee,F$],['Total uses',L.totalUses,F$,true],
        ['Funding gap',L.fundingGap,F$N,true],['Developer fee paid in cash',L.cashDevFee,F$],
      ]},
    ]);
  } else {
    const W=calcWaterfall(res,inp);
    if(W){
      simpleSheet('Equity Waterfall','EQUITY WATERFALL','LP / GP promote distribution',[
        {title:'STRUCTURE',rows:[
          ['LP equity share',W.lpShare,FPx],['GP equity share',W.gpShare,FPx],
          ['Preferred return',W.pref,FPx],
        ]},
        {title:'LIMITED PARTNER',rows:[
          ['Equity contributed',W.lpEq,F$],['Total distributions',W.lpTot,F$],
          ['Net profit',W.lpProfit,F$],['IRR',W.lpIRR,FP],['Equity multiple',W.lpEM,FX,true],
        ]},
        {title:'SPONSOR (GP)',rows:[
          ['Equity contributed',W.gpEq,F$],['Total distributions',W.gpTot,F$],
          ['Net profit',W.gpProfit,F$],['IRR',W.gpIRR,FP],['Equity multiple',W.gpEM,FX,true],
          ['GP promote (above pro-rata)',W.gpPromote,F$,true],
        ]},
      ]);
    }
    if(inp.afterTax){
      const A=calcAfterTax(res,inp);
      if(A)simpleSheet('After-Tax','AFTER-TAX ANALYSIS','Depreciation shield, recapture, capital gains',[
        {title:'RETURNS',rows:[

function parseFile(file,cb){
  const ext=file.name.split('.').pop().toLowerCase();
  if(ext==='csv'){
    Papa.parse(file,{header:true,skipEmptyLines:true,complete:r=>cb({data:r.data,headers:r.meta.fields||[]})});
  }else{
    const rd=new FileReader();
    rd.onload=e=>{
      const wb=XLSX.read(e.target.result,{type:'binary'});
      const sh=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(sh,{defval:''});
      cb({data,headers:data.length?Object.keys(data[0]):[]});
    };
    rd.readAsBinaryString(file);
  }
}
function extractFields(data){
  if(!data||!data.length)return{};
  const out={};
  const r=data[0];
  const keys=Object.keys(r);
  const find=(pats)=>{for(const p of pats){const k=keys.find(k=>k.toLowerCase().replace(/[\s_-]/g,'').includes(p));if(k){const v=pn(r[k]);if(v>0)return v;}}return null;};
  const pp=find(['purchaseprice','saleprice','acquisitionprice','price']);if(pp)out.purchasePrice=pp;
  const la=find(['loanamount','debtamount','mortgage']);if(la)out.loanAmount=la;
  const units=find(['units','unitcount','numberofunits','totalunits']);if(units)out.numUnits=units;
  const rent=find(['avgrent','averagerent','monthlyrent','rentperunit']);if(rent)out.avgRent=rent;
  const noi=find(['noi','netoperatingincome']);if(noi)out.stabilizedNOI=noi;
  const sf=find(['totalsf','totalsqft','rentablesf','grossleasablesf','gla','rsf']);if(sf)out.totalSF=sf;
  const rsf=find(['rentsf','ratepersfrent','rentpersf']);if(rsf)out.avgRentPerSF=rsf;
  const taxes=find(['propertytax','taxes','realestatetax']);if(taxes)out.propertyTax=taxes;
  const ins=find(['insurance','insur']);if(ins)out.insurance=ins;
  return out;
}

function normalizeUnitType(raw){
  const v=String(raw||'').toLowerCase().replace(/[\s_]/g,'');
  if(/studio|^eff|^0(br|bd|bed)?$/.test(v))return{type:'Studio'};
  const m=v.match(/([0-4])\s*(br|bd|bed|x|\/)/);
  const n=m?m[1]:(v.match(/^([0-4])$/)||[])[1];
  if(n==='0')return{type:'Studio'};
  if(n==='1')return{type:'1BR'};
  if(n==='2')return{type:'2BR'};
  if(n==='3')return{type:'3BR'};
  if(n==='4')return{type:'4BR'};
  return{type:'Other',label:String(raw||'Unit').trim()};
}

// Parse a rent roll into a unit mix: detects unit-type + rent (+ optional count) columns.
function extractRentRoll(data){
  if(!data||data.length<2)return null;
  const keys=Object.keys(data[0]);
  const matchCol=pats=>keys.find(k=>{const kl=k.toLowerCase().replace(/[\s_-]/g,'');return pats.some(p=>kl.includes(p));});
  const typeCol=matchCol(['unittype','floorplan','plantype','bedroom','beds','bedbath','unitclass','plan','type']);
  const rentCol=matchCol(['marketrent','askingrent','currentrent','monthlyrent','scheduledrent','rent','rate']);
  if(!typeCol||!rentCol)return null;
  const countCol=matchCol(['unitcount','numunits','ofunits','quantity','count','units']);
  const groups={};
  let total=0;
  data.forEach(row=>{
    const rawType=row[typeCol]; if(rawType===''||rawType==null)return;
    const rent=pn(row[rentCol]); if(rent<=0)return;
    const cnt=countCol?Math.max(1,pn(row[countCol])||1):1;
    const norm=normalizeUnitType(rawType);
    const key=norm.label||norm.type;
    if(!groups[key])groups[key]={type:norm.type,label:norm.label,count:0,rentSum:0};
    groups[key].count+=cnt;
    groups[key].rentSum+=rent*cnt;
    total+=cnt;
  });
  const order={Studio:0,'1BR':1,'2BR':2,'3BR':3,'4BR':4,Other:5};
  const mix=Object.values(groups).map(g=>{
    const row={type:g.type,count:g.count,rent:Math.round(g.rentSum/g.count)};
    if(g.label&&g.type==='Other')row.label=g.label;
    return row;
  }).sort((a,b)=>(order[a.type]??9)-(order[b.type]??9));
  if(!mix.length||total<1)return null;
  const annual=mix.reduce((s,r)=>s+r.count*r.rent*12,0);
  return{unitMix:mix,numUnits:total,avgRent:total?Math.round(annual/total/12):0};
}

// ─── STEP 3 INCOME & EXPENSES ─────────────────────────────────────────────
function Step3({inp,onChange}){
  const t=inp.assetType.toLowerCase();
  const gpi=getGPI(inp);
  const vac=gpi*(inp.vacancyRate||0)/100;
  const egi=gpi-vac+(inp.otherIncome||0);
  const mgmt=egi*(inp.managementFeePct||0)/100;
  const opex=(inp.propertyTax||0)+(inp.insurance||0)+mgmt+(inp.maintenance||0)+(inp.utilities||0)+(inp.reserves||0)+(inp.administrative||0);
  const noi=egi-opex;
  const er=egi>0?opex/egi:0;
  const capBasis=t==='development'?getDevCost(inp):(inp.purchasePrice||0);
  const capR=capBasis>0?noi/capBasis:0;
  return(
    <div className="fu">
      <h2 style={{fontSize:22,fontWeight:800,marginBottom:6}}>Income & Expenses</h2>
      <p style={{color:'#737373',marginBottom:20,fontSize:14}}>Year 1 operating assumptions with live preview as you type</p>
      <div className="glass g4" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',marginBottom:24,overflow:'hidden'}}>
        {[
          {l:'Gross Income',v:f.$(gpi),c:'#3a5bf0'},
          {l:'Eff. Gross Income',v:f.$(egi),c:'#56687a'},
          {l:'NOI',v:f.$(noi),c:noi>0?'#1a7f37':'#b42318'},
          {l:'Expense Ratio',v:`${(er*100).toFixed(1)}%`,c:er>0.6?'#b42318':er>0.45?'#9a6700':'#1a7f37'},
        ].map(i=>(
          <div key={i.l} style={{padding:'12px 14px',textAlign:'center',borderRight:'1px solid #ececec'}}>
            <div style={{fontSize:17,fontWeight:800,color:i.c}}>{i.v}</div>
            <div style={{fontSize:11,color:'#737373',marginTop:3}}>{i.l}</div>
          </div>
        ))}
      </div>
      <SecHdr>Revenue</SecHdr>
      <Slider label="Physical Vacancy + Credit Loss" min={0} max={25} step={0.5} value={inp.vacancyRate||0} onChange={v=>onChange({vacancyRate:v})} fmt2={v=>`${v}%`}/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}} className="g2">
        {t==='multifamily'&&<><Fld label="Units" value={inp.numUnits} onChange={v=>onChange({numUnits:pn(v)})}/><Fld label="Avg Monthly Rent" prefix="$" value={inp.avgRent} onChange={v=>onChange({avgRent:pn(v)})}/></>}
        {t==='commercial'&&<><Fld label="Total SF" value={inp.totalSF} onChange={v=>onChange({totalSF:pn(v)})}/><Fld label="Base Rent / SF" prefix="$" value={inp.avgRentPerSF} onChange={v=>onChange({avgRentPerSF:pn(v)})}/><Fld label="CAM / NNN Income" prefix="$" value={inp.camIncome||0} onChange={v=>onChange({camIncome:pn(v)})}/></>}
        {t==='mixed-use'&&<><Fld label="Residential Units" value={inp.numUnits} onChange={v=>onChange({numUnits:pn(v)})}/><Fld label="Avg Monthly Rent" prefix="$" value={inp.avgRent} onChange={v=>onChange({avgRent:pn(v)})}/><Fld label="Commercial SF" value={inp.commercialSF||0} onChange={v=>onChange({commercialSF:pn(v)})}/><Fld label="Commercial Rent / SF" prefix="$" value={inp.commercialRentPerSF||0} onChange={v=>onChange({commercialRentPerSF:pn(v)})}/></>}
        {t==='development'&&<><Fld label="Stabilized Units" value={inp.numUnits} onChange={v=>onChange({numUnits:pn(v)})}/><Fld label="Avg Monthly Rent" prefix="$" value={inp.avgRent} onChange={v=>onChange({avgRent:pn(v)})}/></>}
        <Fld label="Other Income (Annual)" prefix="$" hint="laundry, parking, fees" value={inp.otherIncome||0} onChange={v=>onChange({otherIncome:pn(v)})}/>
      </div>
      <SecHdr>Operating Expenses</SecHdr>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}} className="g2">
        <Fld label="Property Taxes" prefix="$" hint="annual" value={inp.propertyTax||0} onChange={v=>onChange({propertyTax:pn(v)})}/>
        <Fld label="Insurance" prefix="$" hint="annual" value={inp.insurance||0} onChange={v=>onChange({insurance:pn(v)})}/>
        <Fld label="Property Management Fee" suffix="%" hint="% of EGI" value={inp.managementFeePct||0} onChange={v=>onChange({managementFeePct:pn(v)})}/>
        <Fld label="Repairs & Maintenance" prefix="$" hint="annual" value={inp.maintenance||0} onChange={v=>onChange({maintenance:pn(v)})}/>
        <Fld label="Utilities" prefix="$" hint="annual" value={inp.utilities||0} onChange={v=>onChange({utilities:pn(v)})}/>
        <Fld label="Capital Reserves" prefix="$" hint="annual" value={inp.reserves||0} onChange={v=>onChange({reserves:pn(v)})}/>

// ─── STEP 4 FINANCING ─────────────────────────────────────────────────────
function SizedDebtPreview({inp}){
  let ds=null; try{ds=buildPF(inp).debtSizing;}catch(e){}
  if(!ds)return null;
  return(
    <div style={{margin:'4px 0 8px',padding:'14px 16px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:9}}>
      <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',letterSpacing:'.5px',marginBottom:10}}>SIZING TEST &mdash; LOAN IS THE LESSER OF</div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        {ds.constraints.map((c,i)=>(
          <div key={i} style={{flex:1,minWidth:120,padding:'10px 12px',borderRadius:8,background:c.binds?'var(--ink)':'var(--surface)',border:'1px solid '+(c.binds?'var(--ink)':'var(--border)')}}>
            <div style={{fontSize:11,color:c.binds?'#aab3c9':'var(--muted)'}}>{c.name} <span style={{opacity:.7}}>({c.basis})</span></div>
            <div className="mono" style={{fontSize:14.5,fontWeight:700,color:c.binds?'#fff':'var(--text)',marginTop:2}}>{f.$(c.loan)}</div>
            {c.binds&&<div style={{fontSize:9.5,color:'#7d93ff',fontWeight:700,letterSpacing:'.5px',marginTop:2}}>BINDING</div>}
          </div>
        ))}
      </div>
      <div style={{marginTop:10,fontSize:13,color:'var(--muted)'}}>Sized loan: <span className="mono" style={{fontWeight:700,color:'var(--accent)'}}>{f.$(ds.sizedLoan)}</span> &middot; {ds.binding} constraint binds</div>
    </div>
  );
}
function Step4({inp,onChange}){
  const pp=inp.purchasePrice||0;
  const la=inp.loanAmount||0;
  const ltv=pp>0?la/pp*100:0;
  const acqC=pp*(inp.acquisitionCostsPct||0)/100;
  const lf=la*(inp.loanFeesPct||0)/100;
  const t=inp.assetType.toLowerCase();
  const devCost=t==='development'?getDevCost(inp):0;
  const eq=(t==='development'?devCost:pp)+acqC+lf-la;
  const ds=monthlyPmt(la,(inp.interestRate||0)/100,inp.amortYears||30)*12;
  const noi=getGPI(inp)*(1-(inp.vacancyRate||0)/100)+(inp.otherIncome||0)-getOpEx(inp);
  const dscr=ds>0?noi/ds:null;
  return(
    <div className="fu">
      <h2 style={{fontSize:22,fontWeight:800,marginBottom:6}}>Financing & Assumptions</h2>
      <p style={{color:'#737373',marginBottom:20,fontSize:14}}>Debt structure, growth rates, and exit strategy</p>
      <div className="glass g4" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',marginBottom:24,overflow:'hidden'}}>
        {[
          {l:t==='development'?'LTC':'LTV',v:`${(t==='development'&&devCost>0?la/devCost*100:ltv).toFixed(1)}%`,c:(t==='development'&&devCost>0?la/devCost*100:ltv)>90?'#b42318':(t==='development'&&devCost>0?la/devCost*100:ltv)>80?'#9a6700':'#1a7f37'},

      </>):(
        <div style={{marginTop:18,padding:'14px 16px',background:'#f4f0f8',border:'1px solid #e0d8ec',borderRadius:4,fontSize:13,color:'#7a5195'}}>
          The LP/GP promote waterfall is not applied to affordable / LIHTC deals. Tax-credit partnership economics are driven by credit delivery and are shown in the LIHTC analysis instead.

    </div>
  );
}

// ─── PROFORMA TABLE ────────────────────────────────────────────────────────
function PFTable({rows,hp}){
  const visible=rows.slice(0,hp);
  const defs=[
    {l:'Gross Potential Income',k:'gpi',fmt:f.$f,type:'income'},
    {l:'  Less: Vacancy Loss',k:'vacL',fmt:v=>`(${f.$f(v)})`,type:'deduct'},
    {l:'Effective Gross Income',k:'egi',fmt:f.$f,type:'sub'},
    {l:'  Less: Operating Expenses',k:'opex',fmt:v=>`(${f.$f(v)})`,type:'deduct'},
    {l:'Net Operating Income',k:'noi',fmt:f.$f,type:'hl'},
    {l:'  Less: Debt Service',k:'ds',fmt:v=>`(${f.$f(v)})`,type:'deduct'},
    {l:'Cash Flow Before Tax',k:'cfbt',fmt:f.$f,type:'hl'},
    {l:'RATIOS & METRICS',k:null,type:'sec'},
    {l:'Cap Rate',k:'capR',fmt:v=>f.pct(v,2),type:'metric'},
    {l:'Cash-on-Cash Return',k:'coc',fmt:v=>f.pct(v,2),type:'metric'},
    {l:'DSCR',k:'dscr',fmt:v=>v?`${v.toFixed(2)}x`:'N/A',type:'metric'},
    {l:'Expense Ratio',k:'expR',fmt:v=>f.pct(v,1),type:'metric'},
    {l:'Loan Balance (EOY)',k:'bal',fmt:f.$f,type:'metric'},
  ];
  return(
    <div style={{overflowX:'auto'}}>
      <table className="tbl">
        <thead>
          <tr>
            <th style={{textAlign:'left',minWidth:190}}>Line Item</th>
            {visible.map(r=><th key={r.yr}>Year {r.yr}</th>)}
          </tr>
        </thead>
        <tbody>
          {defs.map((d,i)=>{
            if(d.type==='sec')return(
              <tr key={i} className="sec"><td colSpan={visible.length+1}>{d.l}</td></tr>
            );
            return(
              <tr key={i} className={d.type==='hl'?'sub':''}>
                <td>{d.l}</td>
                {visible.map(r=>{
                  const v=d.k?r[d.k]:null;
                  const str=v!=null?d.fmt(v):'—';
                  const isPos=d.k==='cfbt'&&v>0;
                  const isNeg=d.k==='cfbt'&&v<0;
                  return<td key={r.yr} className={isPos?'pos':isNeg?'neg':''}>{str}</td>;
                })}
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

// ─── SENSITIVITY TABLE ─────────────────────────────────────────────────────
function SensTable({inp}){
  const [caps,setCaps]=useState([4.5,5.0,5.5,6.0,6.5,7.0]);
  const [growths,setGrowths]=useState([1,2,3,4,5]);
  const getIRR=(rg,ec)=>buildPF({...inp,revenueGrowth:rg,exitCapRate:ec}).ret.irr;
  const setCap=(i,v)=>setCaps(caps.map((c,j)=>j===i?(parseFloat(v)||0):c));
  const setGr=(i,v)=>setGrowths(growths.map((g,j)=>j===i?(parseFloat(v)||0):g));
  const axIn={width:'100%',border:'none',background:'transparent',color:'#fff',fontWeight:700,fontSize:12,textAlign:'center',outline:'none',fontFamily:'inherit'};
  const axInL={width:46,border:'1px solid #c7c5c0',borderRadius:3,background:'#fff',color:'#1f3864',fontWeight:700,fontSize:12,textAlign:'center',outline:'none',fontFamily:'inherit',padding:'3px 2px'};
  return(
    <div>
      <div className="sect-lbl" style={{marginBottom:6}}>Levered IRR Sensitivity</div>
      <p style={{fontSize:12,color:'#737373',marginBottom:6}}>Each cell is the deal's levered IRR at that revenue growth and exit cap. Edit any axis value below and the grid recalculates live. All other inputs held constant.</p>
      <p style={{fontSize:12,color:'#737373',marginBottom:14}}><span style={{color:'#1a7f37'}}>&#9632; &gt;15%</span>  <span style={{color:'#9a6700',marginLeft:8}}>&#9632; 10-15%</span>  <span style={{color:'#b42318',marginLeft:8}}>&#9632; &lt;10%</span></p>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
        <span style={{fontSize:11,fontWeight:700,color:'#8c8c8c',letterSpacing:'.5px'}}>EXIT CAP RATE &rarr; (columns, editable)</span>
      </div>
      <div style={{overflowX:'auto'}}>
        <table className="tbl">
          <thead><tr>
            <th style={{textAlign:'left',minWidth:140}}>Revenue Growth &darr;<br/><span style={{fontWeight:400,color:'#8c9bb5'}}>vs. Exit Cap &rarr;</span></th>
            {caps.map((c,i)=><th key={i}><input value={c} onChange={e=>setCap(i,e.target.value)} style={axIn} inputMode="decimal"/></th>)}
          </tr></thead>
          <tbody>{growths.map((g,gi)=>(
            <tr key={gi}>
              <td style={{fontWeight:700,color:'#5f5f5f'}}>
                <input value={g} onChange={e=>setGr(gi,e.target.value)} style={axInL} inputMode="decimal"/> <span style={{color:'#8c8c8c'}}>% / yr</span>
              </td>
              {caps.map((c,ci)=>{
                const irr=getIRR(g,c);
                const col=irr>0.15?'#1a7f37':irr>0.10?'#9a6700':'#b42318';
                const bg=irr>0.15?'#e6f4ea':irr>0.10?'#fbf3da':'#fdecea';
                return<td key={ci} style={{background:bg,color:col,fontWeight:700,textAlign:'center',borderRadius:3}}>{f.pct(irr,1)}</td>;
              })}
            </tr>
          ))}</tbody>
        </table>
      </div>
    </div>
  );
}

// ─── ANALYST NOTES (auto-generated) ───────────────────────────────────────
function analystNotes(res,inp){
  const{rows,ret,sum,exit,equity}=res;
  const hp=Math.min(Math.max(inp.holdingPeriod||7,1),10);
  const notes=[];
  notes.push(`This deal projects a ${f.pct(ret.irr,1)} levered IRR and a ${f.x(ret.em)} equity multiple over a ${hp}-year hold, returning ${f.$f(ret.totalCF+exit.proceeds)} on ${f.$f(equity)} of invested equity.`);
  if(sum.dscr!=null){
    if(sum.dscr<1.20)notes.push(`Year 1 DSCR of ${sum.dscr.toFixed(2)}x is below the 1.20x to 1.25x minimum most lenders require. As structured, this loan amount is unlikely to be financeable without more income or less leverage.`);
    else if(sum.dscr<1.40)notes.push(`Year 1 DSCR of ${sum.dscr.toFixed(2)}x clears typical lender minimums but leaves a thin cushion. A modest income shortfall or expense overrun would pressure coverage.`);
    else notes.push(`Year 1 DSCR of ${sum.dscr.toFixed(2)}x provides healthy debt coverage with room to absorb underperformance.`);
  }
  const totalRet=ret.totalCF+exit.proceeds;
  if(totalRet>0){
    const saleShare=exit.proceeds/totalRet;
    if(saleShare>0.7)notes.push(`${f.pct(saleShare,0)} of total capital returned comes from the exit sale, so the headline IRR is highly sensitive to the ${inp.exitCapRate}% exit cap assumption. Review the sensitivity table before relying on it.`);
    else if(saleShare>0)notes.push(`Returns are reasonably balanced between operating cash flow (${f.pct(1-saleShare,0)}) and exit proceeds (${f.pct(saleShare,0)}), which reduces dependence on the exit cap assumption.`);
  }
  const occCushion=1-sum.beOcc-(inp.vacancyRate||0)/100;
  if(sum.beOcc>0){
    if(occCushion<0.05)notes.push(`Break-even occupancy of ${f.pct(sum.beOcc,1)} leaves very little margin versus the ${inp.vacancyRate}% vacancy assumption. Small leasing setbacks would turn cash flow negative.`);
    else notes.push(`Break-even occupancy of ${f.pct(sum.beOcc,1)} leaves a comfortable cushion against the underwritten ${inp.vacancyRate}% vacancy.`);
  }
  const y1=rows[0];
  if(y1&&y1.expR>0.55)notes.push(`A ${f.pct(y1.expR,0)} expense ratio is high for this profile. Verify the tax, insurance, and maintenance inputs reflect actuals rather than placeholders.`);
  return notes;
}

                  <span style={{color:r.c||(r.bold?'#191919':'#3f3f3f'),fontWeight:r.bold?700:400}}>{r.v}</span>

// ─── DEAL MEMO GENERATOR ──────────────────────────────────────────────────
function generateMemo(res,inp){
  const t=(inp.assetType||'').toLowerCase();
  const isAff=t==='affordable';
  const hp=Math.min(Math.max(inp.holdingPeriod||7,1),10);
  const name=inp.propertyName||'the Property';
  const $=f.$; const pct=(n,d=1)=>f.pct(n,d);
  const units=inp.numUnits||0;
  const S=[];
  // Executive Summary
  if(isAff){
    const L=res.lihtc;
    S.push(['Executive Summary',
      `This memorandum presents an underwriting summary for ${name}, a ${units?units+'-unit ':''}affordable housing development structured around Low-Income Housing Tax Credits. Total development cost is ${$(L.totalUses)}, funded through a permanent loan of ${$(L.permLoan)} sized to a minimum debt service coverage of ${(inp.minDSCR||1.15).toFixed(2)}x, ${$(L.lihtcEquity)} of tax-credit equity, and the balance from soft sources and a deferred developer fee. The ${(L.creditRate*100).toFixed(0)}% credit generates an annual allocation of ${$(L.annualCredit)} over a ten-year period.`]);
  }else{
    S.push(['Executive Summary',
      `This memorandum presents an investment underwriting summary for ${name}${inp.address?', located at '+inp.address:''}, a ${inp.assetType.toLowerCase()} opportunity. The analysis assumes a ${hp}-year hold and projects a levered internal rate of return of ${pct(res.ret.irr,1)} and an equity multiple of ${f.x(res.ret.em)} on required equity of ${$(res.equity)}. The deal generates a year-one cash-on-cash return of ${pct(res.sum.coc,1)} at a going-in capitalization rate of ${pct(res.sum.capR,2)}.`]);
  }
  // Investment Highlights / Capital Stack
  if(isAff){
    const L=res.lihtc;
    S.push(['Sources of Capital',
      `The capital stack is led by ${$(L.lihtcEquity)} in LIHTC equity, representing ${L.totalUses>0?pct(L.lihtcEquity/L.totalUses,0):'0%'} of total development cost, priced at $${L.creditPrice.toFixed(3)} per credit dollar. A permanent loan of ${$(L.permLoan)} is supported by stabilized net operating income of ${$(res.sum.noi)}. ${L.softSources>0?'Soft sources contribute '+$(L.softSources)+'. ':''}A deferred developer fee of ${$(L.deferredFee)} closes the remaining gap, leaving ${$(L.cashDevFee)} of the fee payable in cash. ${Math.abs(L.fundingGap)<1?'As underwritten, sources and uses are balanced.':(L.fundingGap>0?'As underwritten, the deal carries a funding shortfall of '+$(L.fundingGap)+' that requires additional sources.':'As underwritten, sources exceed uses by '+$(Math.abs(L.fundingGap))+'.')}`]);
  }else{
    const exitShare=res.exit.proceeds/(res.ret.totalCF+res.exit.proceeds||1);
    S.push(['Returns Analysis',
      `Over the ${hp}-year hold, the investment returns ${$(res.ret.totalCF+res.exit.proceeds)} in total, comprising ${$(res.ret.totalCF)} of cumulative operating cash flow and ${$(res.exit.proceeds)} of net proceeds at exit. The exit assumes a sale at a ${pct((inp.exitCapRate||0)/100,2)} capitalization rate on forward net operating income, net of ${pct((inp.sellingCostsPct||0)/100,0)} selling costs. ${exitShare>0.7?'Because roughly '+pct(exitShare,0)+' of total return depends on the sale, the projected IRR is sensitive to the exit cap rate assumption and should be stress-tested.':'Returns are reasonably balanced between operating cash flow and exit proceeds.'}`]);
  }
  // Financing & Coverage
  const dscrTxt = res.sum.dscr ? `Year-one debt service coverage is ${res.sum.dscr.toFixed(2)}x${res.sum.dscr<1.2?', which is thin relative to typical lender minimums and limits proceeds':(res.sum.dscr<1.4?', which clears typical lender minimums with a modest cushion':', which provides healthy coverage')}.` : 'The deal is underwritten without permanent debt.';
  if(!isAff){
    S.push(['Financing',
      `${dscrTxt} The analysis assumes a loan at ${pct((inp.interestRate||0)/100,2)} interest over a ${inp.amortYears||30}-year amortization${(inp.ioPeriod||0)>0?', including '+inp.ioPeriod+' years of interest-only payments':''}. Break-even occupancy is ${pct(res.sum.beOcc,1)}, against an underwritten vacancy assumption of ${pct((inp.vacancyRate||0)/100,0)}.`]);
  }
  // Risks
  const risks=[];
  if(res.sum.dscr&&res.sum.dscr<1.25)risks.push('debt service coverage is tight and leaves limited room for income shortfalls');
  if(!isAff){const es=res.exit.proceeds/(res.ret.totalCF+res.exit.proceeds||1);if(es>0.7)risks.push('a large share of return depends on the exit, exposing the deal to cap-rate movement');}
  if(isAff&&res.lihtc.fundingGap>1)risks.push('the capital stack does not fully cover development cost as underwritten');
  const y1=res.rows[0];if(y1&&y1.expR>0.55)risks.push('the operating expense ratio is high and should be verified against actuals');
  risks.push('all projections depend on the accuracy of the underwriting assumptions and prevailing market conditions');
  S.push(['Key Risks',`The principal risks to this underwriting are that ${risks.join('; ')}.`]);
  // Recommendation
  if(isAff){
    S.push(['Summary',`${name} pencils as ${Math.abs(res.lihtc.fundingGap)<1?'a balanced':'a'} tax-credit transaction with ${$(res.lihtc.lihtcEquity)} of credit equity anchoring the capital stack. Further diligence on basis eligibility, the credit price, and soft-source commitments is recommended before proceeding.`]);
  }else{
    const verdict=res.ret.irr>0.15?'an attractive return profile':(res.ret.irr>0.10?'a reasonable return profile':'a modest return profile');
    S.push(['Recommendation',`At a projected ${pct(res.ret.irr,1)} levered IRR and ${f.x(res.ret.em)} equity multiple, ${name} presents ${verdict} for a ${hp}-year hold. The recommendation is to advance to confirmatory diligence, with particular attention to the assumptions driving exit value and operating expenses.`]);
  }
  return S;
}

  else{rows=[m('Levered IRR',f.pct(res.ret.irr,1)),m('Equity Multiple',f.x(res.ret.em)),m('Equity Required',f.$(res.equity)),m('Year 1 Cap Rate',f.pct(res.sum.capR,2)),m('Year 1 Cash-on-Cash',f.pct(res.sum.coc,1)),m('Year 1 DSCR',res.sum.dscr?res.sum.dscr.toFixed(2)+'x':'n/a'),m('Net Sale Proceeds',f.$(res.exit.proceeds)),m('Hold Period',hp+' Years')];}

const DEALS_KEY='proforma_saved_deals';
function loadDealsLocal(){try{return JSON.parse(localStorage.getItem(DEALS_KEY)||'[]');}catch(e){return[];}}

function normalizeDeal(r){return{id:r.id,name:r.name,assetType:r.asset_type||r.assetType,savedAt:r.saved_at||r.savedAt,inp:r.inp_data||r.inp,summary:r.summary,notes:r.notes||''};}
async function loadDeals(user){
  if(user){const{data,error}=await sb.from('deals').select('*').order('saved_at',{ascending:false});if(!error&&data)return data.map(normalizeDeal);}
  return loadDealsLocal();
}
async function deleteDeal(id,user){

function dealSummary(res,inp){
  const isAff=(inp.assetType||'').toLowerCase()==='affordable';
  return isAff?{
    type:'affordable',
    irr:null,em:null,
    equity:res.lihtc?res.lihtc.lihtcEquity:0,

  }:{

    irr:res.ret.irr,em:res.ret.em,dscr:res.sum.dscr,

}
async function persistDeal(inp,res,user){
  const entry={
    id:'d'+Date.now(),
    name:inp.propertyName||'Untitled Deal',
    assetType:inp.assetType,
    savedAt:new Date().toISOString(),
    inp:JSON.parse(JSON.stringify(inp)),
    summary:dealSummary(res,inp),
    notes:inp.dealNotes||''
  };
  if(user){
    const{error}=await sb.from('deals').insert({id:entry.id,user_id:user.id,name:entry.name,asset_type:entry.assetType,saved_at:entry.savedAt,inp_data:entry.inp,summary:entry.summary,notes:entry.notes});

function calcPortfolio(deals){
  let stdEquity=0,affEquity=0,totalProceeds=0,totalNOI=0,wIRRnum=0,wEMnum=0,stdCount=0,affCount=0,affUses=0;
  const byType={}; const pooled=[];
  deals.forEach(d=>{
    let res; try{res=buildPF(d.inp);}catch(e){return;}
    const at=(d.inp.assetType||'').toLowerCase();
    byType[at]=byType[at]||{count:0,equity:0,label:(ASSETS.find(a=>a.id===at)||{}).label||at};
    byType[at].count++;
    if(at==='affordable'){
      affCount++; const eq=res.lihtc?res.lihtc.lihtcEquity:0; affEquity+=eq; affUses+=res.lihtc?res.lihtc.totalUses:0; byType[at].equity+=eq;
    } else {
      stdCount++; const eq=res.equity||0; stdEquity+=eq;
      totalProceeds+=res.exit.proceeds||0; totalNOI+=res.sum.noi||0;
      wIRRnum+=(res.ret.irr||0)*eq; wEMnum+=(res.ret.em||0)*eq; byType[at].equity+=eq;
      const hp=Math.min(Math.max(d.inp.holdingPeriod||7,1),10);
      pooled[0]=(pooled[0]||0)-eq;
      for(let y=1;y<=hp;y++){let c=res.rows[y-1].cfbt; if(y===hp)c+=res.exit.proceeds; pooled[y]=(pooled[y]||0)+c;}
    }
  });
  return{
    stdCount,affCount,total:stdCount+affCount,
    stdEquity,affEquity,totalEquity:stdEquity+affEquity,
    totalProceeds,totalNOI,affUses,
    wIRR:stdEquity>0?wIRRnum/stdEquity:0, wEM:stdEquity>0?wEMnum/stdEquity:0,
    pooledIRR:pooled.length>1?calcIRR(pooled):NaN,
    byType:Object.values(byType)
  };
}

        <div style={{display:'flex',gap:12,flexWrap:'wrap',marginBottom:14}}>
          {kpi('Total Equity',f.$(P.totalEquity),P.affEquity>0?f.$(P.stdEquity)+' std + '+f.$(P.affEquity)+' LIHTC':null)}
          {P.stdCount>0&&kpi('Pooled IRR',f.pct(P.pooledIRR,1),'across '+P.stdCount+' market-rate')}
          {P.stdCount>0&&kpi('Equity-Wtd IRR',f.pct(P.wIRR,1),'weighted average')}
          {P.stdCount>0&&kpi('Equity-Wtd Multiple',f.x(P.wEM),null)}
        </div>
        <div style={{display:'flex',gap:12,flexWrap:'wrap',marginBottom:24}}>
          {P.stdCount>0&&kpi('Total Exit Proceeds',f.$(P.totalProceeds),null)}
          {P.stdCount>0&&kpi('Aggregate Yr-1 NOI',f.$(P.totalNOI),null)}
          {P.affCount>0&&kpi('LIHTC Equity',f.$(P.affEquity),P.affCount+' affordable')}
          {P.affCount>0&&kpi('Affordable Dev Cost',f.$(P.affUses),null)}
        </div>
        <div className="glass" style={{overflow:'hidden'}}>
          <table className="tbl">
            <thead><tr><th style={{textAlign:'left'}}>Asset Type</th><th>Deals</th><th>Equity</th><th>% of Book</th></tr></thead>
            <tbody>
              {P.byType.map((b,i)=>(
                <tr key={i}>
                  <td style={{fontWeight:600,color:'var(--text)'}}>{b.label}</td>
                  <td>{b.count}</td>
                  <td>{f.$(b.equity)}</td>
                  <td>{P.totalEquity>0?(b.equity/P.totalEquity*100).toFixed(1)+'%':'0%'}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </>)}
    </div>
  );
}

function SavedDeals({onLoad,onClose,user,onSignIn}){
  const [portfolio,setPortfolio]=useState(false);
  const [deals,setDeals]=useState([]);
  const [loadingDeals,setLoadingDeals]=useState(true);
  const [sel,setSel]=useState([]);
  const [compare,setCompare]=useState(false);

  useEffect(()=>{
    setLoadingDeals(true);
    loadDeals(user).then(d=>{setDeals(d);setLoadingDeals(false);});
  },[user]);

  const del=async id=>{
    await deleteDeal(id,user);
    setDeals(d=>d.filter(x=>x.id!==id));
    setSel(s=>s.filter(x=>x!==id));
  };
  const toggle=id=>setSel(sel.includes(id)?sel.filter(s=>s!==id):(sel.length<2?[...sel,id]:[sel[1],id]));
  const fmtDate=iso=>{try{return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch(e){return '';}};

  if(portfolio)return <PortfolioView onBack={()=>setPortfolio(false)} user={user}/>;
  if(compare&&sel.length===2){
    const a=deals.find(d=>d.id===sel[0]),b=deals.find(d=>d.id===sel[1]);
    if(a&&b)return <CompareView a={a} b={b} onBack={()=>setCompare(false)}/>;
  }
  return(
    <div className="fu" style={{maxWidth:1080,margin:'0 auto',padding:'32px 24px 60px'}}>
      {!user&&<div style={{background:'var(--accent-tint)',border:'1px solid var(--accent)',borderRadius:8,padding:'10px 16px',marginBottom:18,display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
        <span style={{fontSize:13,color:'var(--accent)',fontWeight:500}}>Sign in to save deals to the cloud and access them from any device.</span>
        <button className="btn-p" style={{padding:'6px 14px',fontSize:12.5,flexShrink:0}} onClick={onSignIn}>Sign In</button>
      </div>}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <h2 style={{fontSize:24,fontWeight:800}}>Saved Deals</h2>
        <div style={{display:'flex',gap:10}}>
          {sel.length===2&&<button className="btn-p" onClick={()=>setCompare(true)}>Compare selected</button>}
          {deals.length>0&&<button className="btn-s" onClick={()=>setPortfolio(true)}>Portfolio roll-up</button>}
          <button className="btn-s" onClick={onClose}>+ New analysis</button>
        </div>
      </div>
      {loadingDeals?(
        <div style={{padding:'48px 24px',textAlign:'center',color:'#8c8c8c',fontSize:14}}>Loading deals...</div>
      ):deals.length===0?(
        <div className="glass" style={{padding:'48px 24px',textAlign:'center',color:'#8c8c8c'}}>
          <div style={{fontSize:15,marginBottom:6}}>No saved deals yet.</div>
          <div style={{fontSize:13}}>Run an analysis and click Save to keep it here. {user?'Deals sync across devices.':'Deals stay in this browser.'}</div>
        </div>
      ):(
        <>
          <p style={{fontSize:12.5,color:'#8c8c8c',marginBottom:14}}>Select two deals to compare them side by side. {user?'Deals are synced to your account.':'Saved deals are stored in this browser only.'}</p>
          <div style={{display:'grid',gap:10}}>
            {deals.map(d=>{
              const s=d.summary||{}; const picked=sel.includes(d.id);
              return(
                <div key={d.id} className="glass" style={{padding:'16px 18px',borderColor:picked?'#3a5bf0':'#e2e6f0',borderWidth:picked?2:1}}>
                  <div style={{display:'flex',alignItems:'center',gap:16}}>
                    <input type="checkbox" checked={picked} onChange={()=>toggle(d.id)} style={{width:17,height:17,accentColor:'#3a5bf0',flexShrink:0}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:700,fontSize:15,color:'#191919'}}>{d.name}</div>
                      <div style={{fontSize:12,color:'#8c8c8c'}}>{d.assetType} &middot; saved {fmtDate(d.savedAt)}</div>
                    </div>
                    <div style={{display:'flex',gap:20,fontSize:13,flexShrink:0}}>
                      {s.type==='affordable'?(
                        <><Metric l="LIHTC Equity" v={f.$(s.equity)}/><Metric l="DSCR" v={s.dscr?s.dscr.toFixed(2):'n/a'}/><Metric l="Gap" v={f.$(Math.abs(s.gap||0))}/></>
                      ):(
                        <><Metric l="IRR" v={f.pct(s.irr,1)}/><Metric l="Multiple" v={f.x(s.em)}/><Metric l="DSCR" v={s.dscr?s.dscr.toFixed(2):'n/a'}/></>
                      )}
                    </div>
                    <div style={{display:'flex',gap:8,flexShrink:0}}>
                      <button className="btn-s" style={{padding:'6px 14px',fontSize:13}} onClick={()=>onLoad(d)}>Open</button>
                      <button onClick={()=>del(d.id)} title="Delete" style={{background:'none',border:'1px solid #e2e6f0',borderRadius:3,color:'#b42318',cursor:'pointer',width:32,height:32,fontSize:16}}>&times;</button>
                    </div>
                  </div>
                  <DealNotes id={d.id} initial={d.notes||''} user={user}/>
                </div>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}
function Metric({l,v}){return(<div style={{textAlign:'right'}}><div style={{fontWeight:700,color:'#3a5bf0'}}>{v}</div><div style={{fontSize:10.5,color:'#8c8c8c'}}>{l}</div></div>);}

function CompareView({a,b,onBack}){
  const rA=buildPF(a.inp), rB=buildPF(b.inp);
  const isAff=x=>(x.inp.assetType||'').toLowerCase()==='affordable';
  const bothAff=isAff(a)&&isAff(b);
  const rows=bothAff?[
    ['Total Uses',d=>f.$(d.lihtc.totalUses)],
    ['LIHTC Equity',d=>f.$(d.lihtc.lihtcEquity)],
    ['Annual Credit',d=>f.$(d.lihtc.annualCredit)],
    ['Permanent Loan',d=>f.$(d.lihtc.permLoan)],
    ['Deferred Dev Fee',d=>f.$(d.lihtc.deferredFee)],
    ['Funding Gap',d=>f.$(d.lihtc.fundingGap)],
    ['Year 1 NOI',d=>f.$(d.sum.noi)],
    ['Year 1 DSCR',d=>d.sum.dscr?d.sum.dscr.toFixed(2)+'x':'n/a'],
  ]:[
    ['Levered IRR',d=>f.pct(d.ret.irr,1)],
    ['Equity Multiple',d=>f.x(d.ret.em)],
    ['Equity Required',d=>f.$(d.equity)],
    ['Year 1 Cap Rate',d=>f.pct(d.sum.capR,2)],
    ['Year 1 Cash-on-Cash',d=>f.pct(d.sum.coc,1)],
    ['Year 1 DSCR',d=>d.sum.dscr?d.sum.dscr.toFixed(2)+'x':'n/a'],
    ['Year 1 NOI',d=>f.$(d.sum.noi)],
    ['Net Sale Proceeds',d=>f.$(d.exit.proceeds)],
  ];
  return(
    <div className="fu" style={{maxWidth:1080,margin:'0 auto',padding:'32px 24px 60px'}}>
      <button className="btn-s" onClick={onBack} style={{marginBottom:18}}>← Back to saved deals</button>
      <h2 style={{fontSize:24,fontWeight:800,marginBottom:18}}>Deal Comparison</h2>
      <div className="glass" style={{overflow:'hidden'}}>
        <table className="tbl">
          <thead><tr>
            <th style={{textAlign:'left'}}>Metric</th>
            <th style={{textAlign:'right'}}>{a.name}</th>
            <th style={{textAlign:'right'}}>{b.name}</th>
          </tr></thead>
          <tbody>
            <tr className="sec"><td colSpan={3}>{a.assetType} vs. {b.assetType}</td></tr>
            {rows.map((r,i)=>(
              <tr key={i}>
                <td style={{fontWeight:600,color:'#5f5f5f'}}>{r[0]}</td>
                <td style={{textAlign:'right',fontWeight:700}}>{r[1](rA)}</td>
                <td style={{textAlign:'right',fontWeight:700}}>{r[1](rB)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <p style={{fontSize:12,color:'#8c8c8c',marginTop:12}}>Figures recalculated live from each saved deal's inputs.</p>
    </div>
  );
}

// ─── AUTH MODAL ───────────────────────────────────────────────────────────
function AuthModal({onClose,onUser}){
  const [mode,setMode]=useState('login');
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState('');
  const submit=async()=>{
    setErr('');setBusy(true);
    try{
      let r;
      if(mode==='login')r=await sb.auth.signInWithPassword({email,password:pw});
      else r=await sb.auth.signUp({email,password:pw});
      if(r.error)throw r.error;
      if(mode==='signup'&&!r.data.session){setMsg('Check your email to confirm your account.');setBusy(false);return;}
      if(r.data.user){onUser(r.data.user);onClose();}
    }catch(e){setErr(e.message||'Authentication failed.');}
    setBusy(false);
  };
  const switchMode=m=>{setMode(m);setErr('');setMsg('');};
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',zIndex:500,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="glass" style={{width:'100%',maxWidth:420,padding:'32px 28px',position:'relative'}}>
        <button onClick={onClose} style={{position:'absolute',top:12,right:14,background:'none',border:'none',fontSize:22,cursor:'pointer',color:'var(--muted)',lineHeight:1}}>&times;</button>
        <h2 style={{fontSize:22,fontWeight:700,marginBottom:4}}>{mode==='login'?'Sign In':'Create Account'}</h2>
        <p style={{color:'var(--muted)',fontSize:13.5,marginBottom:22}}>Save your deals to the cloud and access them from any device.</p>
        <Fld label="Email" type="email" value={email} onChange={v=>setEmail(v)}/>
        <Fld label="Password" type="password" value={pw} onChange={v=>setPw(v)}/>
        {err&&<div style={{color:'var(--neg)',fontSize:13,marginBottom:10,marginTop:-4}}>{err}</div>}
        {msg&&<div style={{color:'var(--pos)',fontSize:13,marginBottom:10,marginTop:-4}}>{msg}</div>}
        <button className="btn-p" onClick={submit} disabled={busy||!email||!pw} style={{width:'100%',marginBottom:16,marginTop:6}}>
          {busy?'Please wait…':(mode==='login'?'Sign In':'Create Account')}
        </button>
        <div style={{textAlign:'center',fontSize:13,color:'var(--muted)'}}>
          {mode==='login'
            ?<>No account? <button onClick={()=>switchMode('signup')} style={{background:'none',border:'none',color:'var(--accent)',cursor:'pointer',fontWeight:600,fontSize:13,fontFamily:"'Sora',sans-serif"}}>Sign Up</button></>
            :<>Have an account? <button onClick={()=>switchMode('login')} style={{background:'none',border:'none',color:'var(--accent)',cursor:'pointer',fontWeight:600,fontSize:13,fontFamily:"'Sora',sans-serif"}}>Sign In</button></>}
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────
const STEPS=['Asset Type','Property Info','Income & Expenses','Financing'];

function App(){
  const [view,setView]=useState('landing');
  const [step,setStep]=useState(0);
  const [assetType,setAssetType]=useState('multifamily');
  const [inp,setInp]=useState(DEFS.multifamily);
  const [res,setRes]=useState(null);
  const [loading,setLoading]=useState(false);
  const [user,setUser]=useState(null);
  const [showAuth,setShowAuth]=useState(false);

  useEffect(()=>{
    sb.auth.getUser().then(({data:{user:u}})=>setUser(u||null));
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>setUser(session?.user||null));
    return()=>subscription.unsubscribe();
  },[]);

  const update=useCallback(upd=>setInp(prev=>({...prev,...upd})),[]);

  const handleAsset=useCallback(a=>{
    setAssetType(a);
    setInp(DEFS[a]||DEFS.multifamily);
  },[]);

  const handleCalc=()=>{
    setLoading(true);
    setTimeout(()=>{
      try{const r=buildPF(inp);setRes(r);setStep(4);}
      catch(e){alert('Calculation error: '+e.message);}
      setLoading(false);
    },500);
  };

  const handleSave=async()=>{try{await persistDeal(inp,res,user);}catch(e){alert('Could not save: '+e.message);}};
  const handleLoadDeal=(d)=>{
    setAssetType(d.assetType?d.assetType.toLowerCase():'multifamily');
    setInp(d.inp);
    try{const r=buildPF(d.inp);setRes(r);setStep(4);setView('app');}
    catch(e){setStep(1);setView('app');}
  };

  const progress=(step/STEPS.length)*100;

  return(
    <div style={{minHeight:'100vh',background:'#eef1f7'}}>
      <div style={{background:'rgba(12,19,34,.92)',backdropFilter:'blur(10px)',borderBottom:'1px solid rgba(255,255,255,.08)',padding:'13px 24px',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,zIndex:100}}>
        <div style={{display:'flex',alignItems:'center',gap:11,cursor:'pointer'}} onClick={()=>setView('landing')}>
          <svg width="34" height="34" viewBox="0 0 100 100" style={{flexShrink:0}} xmlns="http://www.w3.org/2000/svg">
            <defs><linearGradient id="hdrAccent" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stopColor="#7d93ff"/><stop offset="1" stopColor="#5a76f6"/></linearGradient></defs>
            <rect x="20" y="64" width="60" height="14" rx="3.5" fill="#4a5a85"/>
            <rect x="20" y="46" width="60" height="14" rx="3.5" fill="#6b7593"/>
            <rect x="20" y="28" width="60" height="14" rx="3.5" fill="#8a93a6"/>
            <rect x="20" y="10" width="60" height="14" rx="3.5" fill="url(#hdrAccent)"/>
          </svg>
          <div>
            <div style={{fontWeight:700,fontSize:17,lineHeight:1.1,color:'#fff',fontFamily:"'Space Grotesk',sans-serif"}}>Cap<span style={{color:'#7d93ff'}}>Stack</span></div>
            <div className="mono" style={{fontSize:9,color:'#6b7593',letterSpacing:'2px',fontWeight:600}}>REAL ESTATE UNDERWRITING</div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:16}}>
          {view!=='landing'&&step<4&&step>0&&<span className="mono" style={{fontSize:11,color:'#6b7593'}}>STEP {step}/{STEPS.length}</span>}
          {view==='landing'&&<button className="btn-p" style={{padding:'7px 18px',fontSize:13}} onClick={()=>setView('app')}>Start an analysis</button>}
          <button onClick={()=>setView('saved')} style={{background:'none',border:'none',cursor:'pointer',fontSize:12.5,color:view==='saved'?'#7d93ff':'#aab3c9',fontWeight:view==='saved'?700:500,padding:0,fontFamily:"'Sora',sans-serif"}}>Saved deals</button>
          {user?(
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:11.5,color:'#8a93a6',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.email}</span>
              <button onClick={async()=>{await sb.auth.signOut();setUser(null);}} style={{background:'none',border:'1px solid rgba(255,255,255,.18)',borderRadius:6,cursor:'pointer',fontSize:12,color:'#aab3c9',padding:'4px 10px',fontFamily:"'Sora',sans-serif"}}>Sign Out</button>
            </div>
          ):(
            <button onClick={()=>setShowAuth(true)} style={{background:'var(--accent)',border:'none',borderRadius:6,cursor:'pointer',fontSize:12.5,color:'#fff',padding:'5px 13px',fontWeight:600,fontFamily:"'Sora',sans-serif"}}>Sign In</button>
          )}
          <a href="https://www.linkedin.com/in/jordanchafitz" target="_blank" rel="noopener" style={{fontSize:12.5,color:'#aab3c9',textDecoration:'none'}}>Built by <span style={{color:'#7d93ff',fontWeight:600}}>Jordan Chafitz</span></a>
          {res&&step<4&&<button className="btn-s" style={{fontSize:12,padding:'6px 14px',background:'rgba(255,255,255,.06)',color:'#fff',borderColor:'rgba(255,255,255,.2)'}} onClick={()=>setStep(4)}>View results →</button>}
        </div>
      </div>

      {view==='landing'&&<Landing onStart={()=>setView('app')} onSample={()=>{const sd={...DEFS.multifamily,propertyName:'Sample Deal'};exportXLSX(buildPF(sd),sd);}}/>}
      {view==='saved'&&<SavedDeals onLoad={handleLoadDeal} onClose={()=>{setView('app');setStep(0);}} user={user} onSignIn={()=>setShowAuth(true)}/>}
      <div style={{maxWidth:1080,margin:'0 auto',padding:'32px 24px 60px',display:(view==='app')?'block':'none'}}>
        {step<4?(
          <>
            <div style={{display:'flex',alignItems:'center',marginBottom:38}}>
              {STEPS.map((s,i)=>(
                <React.Fragment key={i}>
                  <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:5,cursor:i<step?'pointer':'default'}} onClick={()=>{if(i<step)setStep(i);}}>
                    <div className={`step-dot ${i<step?'done':i===step?'act':'idle'}`}>{i<step?'✓':i+1}</div>
                    <span style={{fontSize:10.5,color:i===step?'#3a5bf0':'#8c8c8c',fontWeight:i===step?700:400,whiteSpace:'nowrap'}}>{s}</span>
                  </div>
                  {i<STEPS.length-1&&<div className={`step-line ${i<step?'done':''}`}/>}
                </React.Fragment>
              ))}
            </div>

            <div className="glass" style={{padding:36,marginBottom:28}}>
              {step===0&&<Step1 val={assetType} onChange={handleAsset}/>}
              {step===1&&<Step2 inp={inp} onChange={update} assetType={assetType}/>}
              {step===2&&<Step3 inp={inp} onChange={update}/>}
              {step===3&&<Step4 inp={inp} onChange={update}/>}
            </div>

            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <button className="btn-s" onClick={()=>setStep(s=>Math.max(0,s-1))} disabled={step===0}>← Back</button>
              <div style={{display:'flex',gap:10}}>
                {step<STEPS.length-1?(
                  <button className="btn-p" onClick={()=>setStep(s=>s+1)}>Continue →</button>
                ):(
                  <button className="btn-p" onClick={handleCalc} disabled={loading}
                    style={{minWidth:190,display:'flex',alignItems:'center',gap:8,justifyContent:'center'}}>
                    {loading?'Calculating...':'Generate Pro Forma'}
                  </button>
                )}
              </div>
            </div>
            <div className="prog"><div className="prog-f" style={{width:`${progress}%`}}/></div>
          </>
        ):(
          res&&<Dashboard res={res} inp={inp} onExport={()=>exportXLSX(res,inp)} onBack={()=>setStep(3)} onSave={handleSave}/>
        )}
      </div>

      {showAuth&&<AuthModal onClose={()=>setShowAuth(false)} onUser={u=>setUser(u)}/>}
      <div style={{textAlign:'center',padding:'18px 20px',borderTop:'1px solid #ececec',color:'#8c8c8c',fontSize:11.5}}>
        <span style={{color:'#737373'}}>Built by <a href="https://www.linkedin.com/in/jordanchafitz" target="_blank" rel="noopener" style={{color:'#3a5bf0',textDecoration:'none',fontWeight:600}}>Jordan Chafitz</a></span><br/>
        <span style={{fontSize:10.5}}>All projections are estimates for informational purposes only. Not financial advice.</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
